[env]
# File paths
KUBECONFIG = '{{config_root}}/kubeconfig'
MINIJINJA_CONFIG_FILE = '{{config_root}}/.minijinja.toml'
TALOSCONFIG = '{{config_root}}/talosconfig'
JUST_UNSTABLE = "1"
# Directory paths
ROOT_DIR = '{{config_root}}'
BOOTSTRAP_DIR = '{{config_root}}/bootstrap'
KUBERNETES_DIR = '{{config_root}}/kubernetes'
SCRIPTS_DIR = '{{config_root}}/scripts'
TALOS_DIR = '{{config_root}}/talos'
# Included file paths
_.file = [
  "{{config_root}}/onepassword.env",
  "{{config_root}}/kubernetes/apps/system-upgrade/versions.env"
]

[settings]
experimental = true

[tools]
# Runtimes
node = "24.16.0"
python = "3.14.5"
uv = "0.11.16"
go = "1.26.3"
gum = "0.17.0"

# Mise
"slsa-verifier" = "2.7.1"
"aqua:sigstore/cosign" = "3.0.6"

# 1Password
"1password" = "2.31.1"
"1password-cli" = "2.31.1"

# S3
"aqua:aws/aws-cli" = "2.34.55"

# Flux Stuff
"aqua:fluxcd/flux2" = "2.8.8"
"aqua:flux-iac/tofu-controller/tfctl" = "0.16.3"
"pipx:flux-local" = "8.2.0"

# Kubectl + Plugins
"aqua:kubernetes/kubectl" = "1.32.3"
"aqua:yannh/kubeconform" = "0.7.0"

# Misc K8S Tools
"aqua:kubernetes-sigs/kustomize" = "5.6.0"
"aqua:helm/helm" = "4.2.0"
"aqua:helmfile/helmfile" = "1.5.2"
"aqua:derailed/k9s" = "0.50.18"
"aqua:stern/stern" = "1.34.0"

# Talos Stuff
"aqua:siderolabs/talos" = "1.13.3"
"aqua:budimanjojo/talhelper" = "3.1.10"

# Misc Tools
"aqua:casey/just" = "1.51.0"
"go:github.com/minio/mc" = "RELEASE.2024-10-08T09-37-26Z"
"aqua:cert-manager/cmctl" = "2.5.0"
"aqua:cloudflare/cloudflared" = "2026.5.2"
"asdf:carnei-ro/asdf-cilium-cli" = "0.18.2"
"aqua:cilium/hubble" = "1.19.3"

# Linters
"pipx:yamllint" = "1.38.0"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:jqlang/jq" = "1.7.1"


