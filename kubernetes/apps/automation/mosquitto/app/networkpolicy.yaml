---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mosquitto
  namespace: automation
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mosquitto
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from teslamate (same namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: automation
          podSelector:
            matchLabels:
              app.kubernetes.io/name: teslamate
    # Allow traffic from gatus (observability) for health checks
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gatus
    # Allow traffic within automation namespace for other clients
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: automation
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # Allow Kubernetes API access
    - to:
        - ipBlock:
            cidr: 10.10.10.0/24
      ports:
        - protocol: TCP
          port: 6443
