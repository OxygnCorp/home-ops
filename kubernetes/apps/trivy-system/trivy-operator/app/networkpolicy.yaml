---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trivy-policy
  namespace: trivy-system
  labels:
    app.kubernetes.io/name: trivy-operator
    app.kubernetes.io/instance: trivy-operator
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow flux-system to communicate with trivy-operator for vulnerability scans
    - from:
        - namespaceSelector:
            matchLabels:
              name: flux-system
      ports:
        - protocol: TCP
          port: 80
  egress:
    # Allow scanning images in all namespaces
    - to:
        - namespaceSelector: {}
    # Allow communication with other pods
    - to:
        - podSelector: {}
---
# Documentation for trivy-system NetworkPolicy
# 
# Ingress:
#   - flux-system: Required for Flux to trigger vulnerability scans via trivy-operator API
#
# Egress:
#   - All namespaces: Required to scan container images across the cluster
#   - All pods: Required for inter-pod communication
#
# Note: This is a baseline policy. For stricter security, consider limiting
# egress to specific registries (ghcr.io, docker.io) and specific namespaces.
