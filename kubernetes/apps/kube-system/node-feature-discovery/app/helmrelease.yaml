---
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-feature-discovery
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: node-feature-discovery
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    master:
      replicaCount: 1
    worker:
      config:
        core:
          labelSources: ["pci", "system", "usb"]
      tolerations:
        # The GPU worker (k8s-3) is tainted workload=ai:NoSchedule to keep generic
        # workloads off, but nfd-worker must still run there to enumerate the GPU
        # (PCI vendor 10de) and emit the nvidia.com/gpu.present label required by
        # nvidia-device-plugin scheduling.
        - key: workload
          operator: Equal
          value: ai
          effect: NoSchedule
    prometheus:
      enable: true
