---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nas-kopia-ui
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
  hostnames:
    - kopia.oxygn.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: nas-kopia-ui
          namespace: kopiur-system
          port: 51515
