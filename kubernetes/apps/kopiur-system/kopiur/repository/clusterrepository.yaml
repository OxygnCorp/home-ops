---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: nas
spec:
  allowedNamespaces:
    all: true
  backend:
    filesystem:
      path: /mnt/repository
      volume:
        nfs:
          server: funkstation.internal
          path: /volume1/Kopiur
  encryption:
    passwordSecretRef:
      name: kopiur-repository-secret
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  catalog:
    fallbackNamespace: kopiur-system
    periodicRefresh: true
    refreshInterval: 1h
  create:
    enabled: true
  credentialProjection:
    allowed: true
  identityDefaults:
    hostnameExpr: "namespace"
    usernameExpr: "namespace + '-' + policyName"
  scheduleDefaults:
    timezone: Europe/Paris
  maintenance:
    enabled: true
    namespace: kopiur-system
    schedule:
      full:
        cron: "0 3 * * *"
        jitter: 1h
      quick:
        cron: "0 */6 * * *"
        jitter: 30m
      timezone: Europe/Paris
    takeoverPolicy: Force
  mode: ReadWrite
  moverDefaults:
    securityContext:
      runAsUser: 1024
      runAsGroup: 100
    podSecurityContext:
      fsGroup: 100
      fsGroupChangePolicy: OnRootMismatch
