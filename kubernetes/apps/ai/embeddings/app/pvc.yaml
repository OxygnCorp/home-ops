---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: embeddings
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
  # Local hostpath on k8s-3's SSD for the TEI model cache (re-downloadable).
  # WaitForFirstConsumer ensures the PV is created on the node where the pod
  # lands (k8s-3 via nodeAffinity), bounded to that node's lifetime.
  storageClassName: openebs-hostpath
