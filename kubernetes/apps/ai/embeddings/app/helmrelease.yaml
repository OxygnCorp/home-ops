---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: embeddings
spec:
  chartRef:
    kind: OCIRepository
    name: embeddings
  interval: 1h
  values:
    controllers:
      embeddings:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/huggingface/text-embeddings-inference
              tag: cpu-1.9.3
            args:
              - --model-id
              - intfloat/multilingual-e5-base
            env:
              TZ: Europe/Paris
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 80
                  initialDelaySeconds: 60
                  periodSeconds: 10
                  timeoutSeconds: 15
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 80
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 15
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 80
                  initialDelaySeconds: 120
                  periodSeconds: 10
                  failureThreshold: 30
            resources:
              requests:
                cpu: 2000m
                memory: 4Gi
              limits:
                cpu: 3500m
                memory: 8Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
    # Pin to AVX2-capable nodes (only k8s-3 today). text-embeddings-inference
    # CPU build benefits significantly from AVX2; the Ivy Bridge-EP control
    # planes (k8s-0/1/2) lack AVX2 and the pod would crash or fall back to a
    # slow path. The PVC is bounded to k8s-3 via openebs-hostpath (WFFC).
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: oxygen.dev/avx2
                  operator: In
                  values:
                    - "true"
    tolerations:
      - key: workload
        operator: Equal
        value: ai
        effect: NoSchedule
    persistence:
      data:
        existingClaim: embeddings
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      app:
        ports:
          http:
            port: 80
