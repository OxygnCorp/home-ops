---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./ocirepository.yaml
  - ./helmrelease.yaml
  - ./externalsecret.yaml
  - ./kopiaignore.yaml
configMapGenerator:
  - name: devclaw-configmap
    files:
      - openclaw.json=./resources/openclaw.json
generatorOptions:
  disableNameSuffixHash: true
