---
apiVersion: v1
kind: ConfigMap
metadata:
  name: devclaw-configmap
data:
  openclaw.json: |
    {
      "agents": {
        "defaults": {
          "bootstrapMaxChars": 50000,
          "bootstrapTotalMaxChars": 100000,
          "compaction": {
            "mode": "default",
            "reserveTokensFloor": 30000,
            "memoryFlush": { "enabled": true, "softThresholdTokens": 80000, "prompt": "Extract key decisions, state changes, lessons, blockers to memory/YYYY-MM-DD.md. Format: ## [HH:MM] Topic. Skip routine work. NO_FLUSH if nothing important.", "systemPrompt": "Compacting session context. Extract only what's worth remembering. No fluff." }
          },
          "contextInjection": "always",
          "contextPruning": { "mode": "off" },
          "heartbeat": {
            "directPolicy": "allow",
            "includeReasoning": false,
            "isolatedSession": true,
            "lightContext": true
          },
          "maxConcurrent": 4,
          "memorySearch": {
            "provider": "local",
            "local": {
              "contextSize": 2048
            },
            "query": {
              "hybrid": {
                "enabled": true,
                "textWeight": 0.3,
                "mmr": { "enabled": true },
                "temporalDecay": { "enabled": true }
              }
            }
          },
          "model": {
            "primary": "minimax/MiniMax-M3",
            "fallbacks": [
              "opencode-go/deepseek-v4-flash",
              "opencode-go/kimi-k2.5"
            ]
          },
          "imageModel": {
            "primary": "minimax/image-01",
            "fallbacks": [
              "opencode-go/kimi-k2.5"
            ]
          },
          "models": {
            "minimax/MiniMax-M2.7": { "alias": "mm-m2.7" },
            "minimax/MiniMax-M3": { "alias": "mm-m3" },
            "opencode-go/deepseek-v4-flash": { "alias": "ds-flash" },
            "opencode-go/deepseek-v4-pro": { "alias": "ds-pro" },
            "opencode-go/kimi-k2.5": { "alias": "kimi2.5" }
          },
          "subagents": {
            "archiveAfterMinutes": 120,
            "maxSpawnDepth": 1,
            "maxChildrenPerAgent": 3,
            "maxConcurrent": 4,
            "model": {
              "primary": "minimax/MiniMax-M3",
              "fallbacks": [
                "opencode-go/deepseek-v4-flash"
              ]
            },
            "runTimeoutSeconds": 900,
            "announceTimeoutMs": 180000
          },
          "timeoutSeconds": 600,
          "typingMode": "instant",
          "typingIntervalSeconds": 6,
          "userTimezone": "Europe/Paris"
        },
        "list": [
          {
            "default": true,
            "id": "main",
            "name": "Puchu",
            "workspace": "/home/node/.openclaw/workspace",
            "agentDir": "/home/node/.openclaw/agents/main/agent",
            "heartbeat": {
              "directPolicy": "allow",
              "every": "1h",
              "activeHours": {
                "start": "06:00",
                "end": "22:00"
              },
              "target": "discord",
              "to": "channel:{{ .DISCORD_DEVOPS_CHANNEL_ID }}"
            },
            "identity": {
              "name": "Puchu",
              "emoji": "🛠️"
            }
          }
        ]
      },
      "bindings": [
        {
          "agentId": "main",
          "match": {
            "channel": "discord",
            "peer": {
              "kind": "channel",
              "id": "{{ .DISCORD_DEVOPS_CHANNEL_ID }}"
            },
            "guildId": "{{ .DISCORD_GUILD_ID }}"
          }
        }
      ],
      "channels": {
        "discord": {
          "actions": {
            "messages": true,
            "channels": true,
            "search": true,
            "reactions": false,
            "stickers": false,
            "polls": false,
            "permissions": false,
            "threads": false,
            "pins": false,
            "memberInfo": false,
            "roleInfo": false,
            "roles": false,
            "channelInfo": false,
            "voiceStatus": false,
            "events": false,
            "moderation": false,
            "emojiUploads": false,
            "stickerUploads": false
          },
          "allowFrom": [
            "{{ .DISCORD_MATT_USER_ID }}"
          ],
          "dmPolicy": "allowlist",
          "enabled": true,
          "defaultAccount": "default",
          "execApprovals": {
            "agentFilter": [
              "main"
            ],
            "approvers": [
              "{{ .DISCORD_MATT_USER_ID }}"
            ],
            "enabled": true,
            "target": "channel"
          },
          "groupPolicy": "allowlist",
          "guilds": {
            "{{ .DISCORD_GUILD_ID }}": {
              "channels": {
                "{{ .DISCORD_DEVOPS_CHANNEL_ID }}": {
                  "enabled": true,
                  "requireMention": false
                }
              },
              "users": [
                "{{ .DISCORD_MATT_USER_ID }}"
              ]
            }
          },
          "streaming": {
            "mode": "progress"
          },
          "threadBindings": {
            "enabled": true,
            "idleHours": 24,
            "maxAgeHours": 0,
            "spawnSessions": true
          },
          "token": { "source": "env", "provider": "default", "id": "DISCORD_BOT_TOKEN" }
        }
      },
      "commands": {
        "native": "auto",
        "nativeSkills": "auto",
        "ownerAllowFrom": [
          "discord:{{ .DISCORD_MATT_USER_ID }}"
        ],
        "ownerDisplay": "raw",
        "restart": false
      },
      "cron": {
        "maxConcurrentRuns": 8,
        "failureDestination": {
          "channel": "discord",
          "to": "channel:{{ .DISCORD_DEVOPS_CHANNEL_ID }}",
          "accountId": "default",
          "mode": "announce"
        },
        "failureAlert": {
          "enabled": true,
          "after": 2,
          "cooldownMs": 3600000,
          "includeSkipped": false,
          "mode": "announce",
          "accountId": "default"
        }
      },
      "gateway": {
        "auth": {
          "mode": "token",
          "token": {
            "source": "env",
            "provider": "default",
            "id": "OPENCLAW_GATEWAY_TOKEN"
          }
        },
        "bind": "lan",
        "controlUi": {
          "allowedOrigins": [
            "https://devclaw.oxygn.dev"
          ]
        },
        "mode": "local",
        "port": 18789,
        "tools": {
          "allow": [
            "sessions_send"
          ]
        },
        "trustedProxies": [
          "10.42.0.0/16",
          "10.10.0.0/16"
        ]
      },
      "messages": {
        "ackReactionScope": "group-mentions",
        "groupChat": {
          "visibleReplies": "automatic"
        },
        "statusReactions": {
          "enabled": true
        }
      },
      "mcp": {
        "servers": {
          "toolhive": {
            "url": "http://vmcp-mcp-gateway-devops.ai:4483/mcp",
            "transport": "streamable-http"
          }
        }
      },
      "plugins": {
        "allow": [
          "active-memory",
          "browser",
          "device-pair",
          "discord",
          "document-extract",
          "file-transfer",
          "llm-task",
          "lossless-claw",
          "memory-core",
          "memory-wiki",
          "minimax",
          "oc-path",
          "opencode-go",
          "searxng",
          "thread-ownership",
          "tokenjuice",
          "web-readability"
        ],
        bundledDiscovery: "compat",
        "entries": {
          "browser": { "enabled": true },
          "active-memory": {
            "enabled": true,
            "config": {
              "enabled": true,
              "agents": [
                "main"
              ],
              "model": "opencode-go/deepseek-v4-flash",
              "modelFallback": "minimax/MiniMax-M2.7",
              "timeoutMs": 30000,
              "queryMode": "recent",
              "promptStyle": "balanced",
              "thinking": "off",
              "logging": true,
              "persistTranscripts": true,
              "qmd": {
                "searchMode": "inherit"
              }
            }
          },
          "llm-task": { "enabled": true },
          "lossless-claw": {
            "enabled": true,
            "config": {
              "databasePath": "/home/node/.openclaw/lcm.db",
              "freshTailCount": 64,
              "leafChunkTokens": 80000,
              "contextThreshold": 0.75,
              "incrementalMaxDepth": 1,
              "newSessionRetainDepth": 2,
              "summaryModel": "opencode-go/deepseek-v4-flash",
              "expansionModel": "opencode-go/deepseek-v4-flash",
              "delegationTimeoutMs": 120000,
              "summaryTimeoutMs": 30000,
              "ignoreSessionPatterns": [
                "agent:*:cron:**",
                "agent:*:main:heartbeat"
              ],
              "statelessSessionPatterns": [
                "agent:*:subagent:**"
              ],
              "skipStatelessSessions": true,
              "transcriptGcEnabled": false,
              "proactiveThresholdCompactionMode": "deferred",
              "cacheAwareCompaction": {
                "enabled": true
              },
              "pruneHeartbeatOk": true
            },
            "llm": {
              "allowModelOverride": true,
              "allowedModels": [
                "opencode-go/deepseek-v4-flash"
              ]
            },
            "subagent": {
              "allowModelOverride": true,
              "allowedModels": [
                "opencode-go/deepseek-v4-flash"
              ]
            }
          },
          "memory-core": {
            "enabled": true,
            "config": {
              "dreaming": { "enabled": true }
            }
          },
          "memory-wiki": {
            "enabled": true,
            "config": {
              "vaultMode": "bridge",
              "vault": {
                "path": "/home/node/.openclaw/wiki/main",
                "renderMode": "native"
              },
              "bridge": {
                "enabled": true,
                "readMemoryArtifacts": true,
                "indexDreamReports": true,
                "indexDailyNotes": true,
                "indexMemoryRoot": true,
                "followMemoryEvents": true
              },
              "search": {
                "backend": "shared",
                "corpus": "all"
              },
              "render": {
                "preserveHumanBlocks": true,
                "createBacklinks": true,
                "createDashboards": true
              }
            }
          },
          "minimax": { "enabled": true },
          "opencode-go": { "enabled": true },
          "searxng": {
            "enabled": true,
            "config": {
              "webSearch": {
                "baseUrl": "https://searxng.ai:8080",
                "language": "en"
              }
            }
          },
          "thread-ownership": { "enabled": true },
          "tokenjuice": { "enabled": true },
          "web-readability": { "enabled": true }
        },
        "slots": {
          "contextEngine": "lossless-claw",
          "memory": "memory-core"
        }
      },
      "session": {
        "dmScope": "per-channel-peer",
        "maintenance": {
          "maxEntries": 1000,
          "mode": "enforce",
          "pruneAfter": "7d",
          "resetArchiveRetention": "7d",
          "maxDiskBytes": "500mb",
          "highWaterBytes": "400mb"
        },
        "reset": {
          "idleMinutes": 10080,
          "mode": "idle"
        }
      },
      "skills": {
        "entries": {
          "1password": { "enabled": false },
          "apple-notes": { "enabled": false },
          "apple-reminders": { "enabled": false },
          "bear-notes": { "enabled": false },
          "blogwatcher": { "enabled": false },
          "blucli": { "enabled": false },
          "camsnap": { "enabled": false },
          "clawhub": { "enabled": false },
          "coding-agent": { "enabled": false },
          "discord": { "enabled": false },
          "eightctl": { "enabled": false },
          "gemini": { "enabled": false },
          "gifgrep": { "enabled": false },
          "gog": { "enabled": false },
          "goplaces": { "enabled": false },
          "himalaya": { "enabled": false },
          "imsg": { "enabled": false },
          "mcporter": { "enabled": false },
          "model-usage": { "enabled": false },
          "nano-pdf": { "enabled": false },
          "obsidian": { "enabled": false },
          "openai-whisper": { "enabled": false },
          "openai-whisper-api": { "enabled": false },
          "openhue": { "enabled": false },
          "oracle": { "enabled": false },
          "ordercli": { "enabled": false },
          "peekaboo": { "enabled": false },
          "sag": { "enabled": false },
          "sherpa-onnx-tts": { "enabled": false },
          "slack": { "enabled": false },
          "songsee": { "enabled": false },
          "sonoscli": { "enabled": false },
          "spotify-player": { "enabled": false },
          "summarize": { "enabled": false },
          "things-mac": { "enabled": false },
          "tmux": { "enabled": false },
          "trello": { "enabled": false },
          "video-frames": { "enabled": false },
          "voice-call": { "enabled": false },
          "wacli": { "enabled": false },
          "xurl": { "enabled": false }
        }
      },
      "tools": {
        "agentToAgent": { "enabled": true },
        "elevated": {
          "enabled": true,
          "allowFrom": {
            "discord": ["{{ .DISCORD_MATT_USER_ID }}"]
          }
        },
        "exec": {
          "security": "full",
          "ask": "off",
          "strictInlineEval": false
        },
        "media": { "image": { "timeoutSeconds": 180 } },
        "sessions": { "visibility": "all" },
        "web": {
          "search": {
            "enabled": true,
            "openaiCodex": {
              "enabled": true,
              "mode": "cached"
            }
          },
          "fetch": { "enabled": true }
        }
      },
      "secrets": {
        "providers": {
          "default": {
            "source": "env",
            "allowlist": [
              "OPENCLAW_GATEWAY_TOKEN",
              "DISCORD_BOT_TOKEN"
            ]
          }
        }
      }
    }
