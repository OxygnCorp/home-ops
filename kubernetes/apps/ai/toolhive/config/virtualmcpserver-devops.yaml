---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: VirtualMCPServer
metadata:
  name: mcp-gateway-devops
spec:
  groupRef:
    name: mcp-devops
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
  embeddingServerRef:
    name: text-embeddings-inference
  telemetryConfigRef:
    name: prometheus
  incomingAuth:
    type: anonymous
  outgoingAuth:
    source: discovered
  sessionStorage:
    address: toolhive-dragonfly.ai.svc.cluster.local:6379
    keyPrefix: "mcp-gateway-devops:"
    provider: redis
  podTemplateSpec:
    spec:
      containers:
        - name: vmcp
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 1Gi
