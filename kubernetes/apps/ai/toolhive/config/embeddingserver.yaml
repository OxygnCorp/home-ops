---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/embeddingserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: EmbeddingServer
metadata:
  name: mcp-tools-embedding
spec:
  image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest@sha256:896e07c5d827b94eb77bc899de7460e2dbe9235f9fc934cd265a4531fd2aa911
  model: sentence-transformers/all-MiniLM-L6-v2
  env:
    - name: HOSTNAME
      value: "::"
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  podTemplateSpec:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: oxygen.dev/avx2
                    operator: In
                    values:
                      - "true"
      tolerations:
        # k8s-3 is reserved for AI workloads via workload=ai:NoSchedule.
        - key: workload
          operator: Equal
          value: ai
          effect: NoSchedule
