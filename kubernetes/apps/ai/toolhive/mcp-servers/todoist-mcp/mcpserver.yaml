---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: &name todoist-mcp
spec:
  image: docker.io/node:24-alpine
  transport: streamable-http
  targetPort: 3000
  proxyMode: streamable-http
  proxyPort: 8080
  port: 8080
  env:
    - name: HOME
      value: /tmp
    - name: NPM_CONFIG_CACHE
      value: /tmp/.npm
    - name: PORT
      value: "3000"
  secrets:
    - name: toolhive-todoist
      key: TODOIST_API_KEY
      targetEnvName: TODOIST_API_KEY
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          image: docker.io/node:24-alpine
          command:
            - npx
          args:
            - -y
            - -p
            - "@doist/todoist-mcp@10.1.5"
            - --
            - todoist-mcp-http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  groupRef:
    name: mcp-tools
