---
# yaml-language-server: $schema=https://k8s-schemas.oxygn.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-secret
    template:
      engineVersion: v2
      data:
        ## Gateway token for authentication
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        ## Discord
        DISCORD_BOT_TOKEN: "{{ .DISCORD_BOT_TOKEN }}"
        ## Github
        GH_TOKEN: "{{ .GH_TOKEN }}"
        ## Google Access
        GEMINI_API_KEY: "{{ .GEMINI_API_KEY }}"
        GOOGLE_PLACES_API_KEY: "{{ .GOOGLE_PLACES_API_KEY }}"
        ## 1password
        OP_SERVICE_ACCOUNT_TOKEN: "{{ .OP_SERVICE_ACCOUNT_TOKEN }}"
        ## Anthropic
        ANTHROPIC_API_KEY: "{{ .ANTHROPIC_API_KEY }}"
        ## Minimax
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
        ## Mission Control
        MC_API_KEY: "{{ .MC_API_KEY }}"
  dataFrom:
    - extract:
        key: openclaw
---
# yaml-language-server: $schema=https://k8s-schemas.oxygn.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mission-control
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mission-control-secret
    template:
      engineVersion: v2
      data:
        AUTH_USER: "{{ .MC_USER }}"
        AUTH_PASS: "{{ .MC_PASS }}"
        API_KEY: "{{ .MC_API_KEY }}"
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        ## Github
        GITHUB_TOKEN: "{{ .GH_TOKEN }}"
        ## 1password
        OP_SERVICE_ACCOUNT_TOKEN: "{{ .OP_SERVICE_ACCOUNT_TOKEN }}"
  dataFrom:
    - extract:
        key: openclaw

---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        ## OpenClaw configuration file
        openclaw.json: |
          {
            "gateway": {
              "auth": {
                "mode": "token",
                "token": "{{ .OPENCLAW_GATEWAY_TOKEN }}"
              },
              "controlUi": {
                "allowedOrigins": [
                  "http://localhost:3000",
                  "https://claw.oxygn.dev",
                  "https://claw-code.oxygn.dev",
                  "https://claw-control.oxygn.dev"
                ],
                "allowInsecureAuth": false
              },
              "mode": "local",
              "bind": "loopback",
              "port": 18789,
              "trustedProxies": ["10.42.0.0/16", "10.10.0.0/16", "127.0.0.1"],
              "tools": {
                "allow": ["sessions_send"]
              }
            },
            "browser": {
              "enabled": true,
              "defaultProfile": "default",
              "profiles": {
                "default": {
                  "cdpUrl": "http://localhost:9222",
                  "color": "#4285F4"
                },
                "remote": {
                  "cdpUrl": "http://10.10.20.145:9222",
                  "color": "#4285F4"
                }
              }
            },
            "auth": {
              "profiles": {
                "google:default": {
                  "provider": "google",
                  "mode": "api_key"
                }
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "google/gemini-3.1-pro-preview",
                  "fallbacks": [
                    "minimax/MiniMax-M2.7",
                    "localai/qwen3.5-9b",
                    "google/gemini-3.1-flash-lite-preview"
                  ]
                },
                "models": {
                  "minimax/MiniMax-M2.7": {
                    "alias": "minimax"
                  },
                  "localai/qwen3.5-9b": {
                    "alias": "qwen"
                  },
                  "google/gemini-3.1-pro-preview": {
                    "alias": "gemini-pro"
                  },
                  "google/gemini-3.1-flash-lite-preview": {
                    "alias": "gemini-flash"
                  }
                },
                "imageModel": {
                  "primary": "minimax/MiniMax-VL-01",
                  "fallbacks": [
                    "google/gemini-3.1-flash-lite-preview"
                  ]
                },
                "contextPruning": {
                  "mode": "cache-ttl",
                  "ttl": "6h",
                  "keepLastAssistants": 4,
                  "softTrimRatio": 0.3,
                  "hardClearRatio": 0.5,
                  "minPrunableToolChars": 50000,
                  "softTrim": {
                    "maxChars": 4000,
                    "headChars": 1500,
                    "tailChars": 1500
                  },
                  "hardClear": {
                    "enabled": true,
                    "placeholder": "[Old tool result content cleared]"
                  }
                },
                "compaction": {
                  "mode": "safeguard",
                  "reserveTokensFloor": 24000,
                  "memoryFlush": {
                    "enabled": true,
                    "softThresholdTokens": 12000,
                    "prompt": "Extract key decisions, state changes, lessons, blockers to memory/YYYY-MM-DD.md. Format: ## [HH:MM] Topic. Skip routine work. NO_FLUSH if nothing important.",
                    "systemPrompt": "Compacting session context. Extract only what's worth remembering. No fluff."
                  }
                },
                "subagents": {
                  "archiveAfterMinutes": 120,
                  "model": {
                    "primary": "minimax/MiniMax-M2.7"
                  },
                  "maxConcurrent": 3,
                  "thinking": "low"
                },
                "heartbeat": {
                  "directPolicy": "allow",
                  "lightContext": true,
                  "includeReasoning": true
                },
                "userTimezone": "UTC+1",
                "timeoutSeconds": 600,
                "memorySearch": {
                  "provider": "local",
                  "local": { "modelPath": "hf:ggml-org/embeddinggemma-300M-GGUF/embeddinggemma-300M-Q8_0.gguf" },
                  "fallback": "gemini",
                  "model": "gemini-embedding-001",
                  "sync": { "watch": true },
                  "query": { "hybrid": { "enabled": true, "vectorWeight": 0.7, "textWeight": 0.3 } }
                }
              },
              "list": [
                {
                  "id": "main",
                  "default": true,
                  "name": "Claw",
                  "identity": {
                    "name": "OpenClaw",
                    "emoji": "🦞"
                  },
                  "model": {
                    "primary": "minimax/MiniMax-M2.7"
                  },
                  "heartbeat": {
                    "every": "1h",
                    "target": "discord",
                    "directPolicy": "allow",
                    "to": "channel:{{ .DISCORD_CLAW_CHANNEL_ID }}",
                    "activeHours": { "start": "06:00", "end": "22:00" }
                  },
                  "workspace": "/home/node/.openclaw/workspace",
                  "agentDir": "/home/node/.openclaw/agents/main/agent"
                },
                {
                  "id": "devops",
                  "name": "DevOps SRE",
                  "workspace": "/home/node/.openclaw/workspace-devops",
                  "agentDir": "/home/node/.openclaw/agents/devops/agent",
                  "model": {
                    "primary": "minimax/MiniMax-M2.7"
                  },
                  "identity": {
                    "name": "DevOps Bot",
                    "emoji": "🛠️"
                  },
                  "groupChat": {
                    "mentionPatterns": ["@devops", "@sre"]
                  },
                  "heartbeat": {
                    "every": "30m",
                    "target": "discord",
                    "directPolicy": "allow",
                    "to": "channel:{{ .DISCORD_DEVOPS_CHANNEL_ID }}",
                    "activeHours": { "start": "06:00", "end": "22:00" }
                  }
                },
                {
                  "id": "family",
                  "name": "Family",
                  "workspace": "/home/node/.openclaw/workspace-family",
                  "agentDir": "/home/node/.openclaw/agents/family/agent",
                  "model": {
                    "primary": "minimax/MiniMax-M2.7"
                  },
                  "identity": {
                    "name": "Family Bot",
                    "emoji": "🏠"
                  },
                  "groupChat": {
                    "mentionPatterns": ["@family", "@familybot"]
                  },
                  "heartbeat": {
                    "every": "6h",
                    "target": "discord",
                    "directPolicy": "allow",
                    "to": "channel:{{ .DISCORD_FAMILY_CHANNEL_ID }}",
                    "activeHours": { "start": "06:00", "end": "22:00" }
                  }
                },
                {
                  "id": "coach",
                  "name": "Mentor",
                  "workspace": "/home/node/.openclaw/workspace-coach",
                  "agentDir": "/home/node/.openclaw/agents/coach/agent",
                  "model": {
                    "primary": "minimax/MiniMax-M2.7"
                  },
                  "identity": {
                    "name": "Coach",
                    "emoji": "🎓"
                  },
                  "groupChat": {
                    "mentionPatterns": ["@coach", "@coachbot"]
                  },
                  "heartbeat": {
                    "every": "6h",
                    "target": "discord",
                    "directPolicy": "allow",
                    "to": "channel:{{ .DISCORD_COACH_CHANNEL_ID }}",
                    "activeHours": { "start": "06:00", "end": "22:00" }
                  }
                },
                {
                  "id": "finance",
                  "name": "Finance Expert",
                  "workspace": "/home/node/.openclaw/workspace-finance",
                  "agentDir": "/home/node/.openclaw/agents/finance/agent",
                  "model": {
                    "primary": "minimax/MiniMax-M2.7"
                  },
                  "identity": {
                    "name": "Finance Bot",
                    "emoji": "📈"
                  },
                  "groupChat": {
                    "mentionPatterns": ["@finance", "@financebot"]
                  },
                  "heartbeat": {
                    "every": "6h",
                    "target": "discord",
                    "directPolicy": "allow",
                    "to": "channel:{{ .DISCORD_FINANCE_CHANNEL_ID }}",
                    "activeHours": { "start": "06:00", "end": "22:00" }
                  }
                },
                {
                  "id": "shopping",
                  "name": "Shopping Assistant",
                  "workspace": "/home/node/.openclaw/workspace-shopping",
                  "agentDir": "/home/node/.openclaw/agents/shopping/agent",
                  "model": {
                    "primary": "minimax/MiniMax-M2.7"
                  },
                  "identity": {
                    "name": "Shopping Bot",
                    "emoji": "🛒"
                  },
                  "groupChat": {
                    "mentionPatterns": ["@shopping", "@shoppingbot"]
                  },
                  "heartbeat": {
                    "every": "6h",
                    "target": "discord",
                    "directPolicy": "allow",
                    "to": "channel:{{ .DISCORD_SHOPPING_CHANNEL_ID }}",
                    "activeHours": { "start": "06:00", "end": "22:00" }
                  }
                }
              ]
            },
            "bindings": [
              {
                "agentId": "devops",
                "match": {
                  "channel": "discord",
                  "guildId": "{{ .DISCORD_GUILD_ID }}",
                  "peer": { "kind": "channel", "id": "{{ .DISCORD_DEVOPS_CHANNEL_ID }}" }
                }
              },
              {
                "agentId": "main",
                "match": {
                  "channel": "discord",
                  "guildId": "{{ .DISCORD_GUILD_ID }}",
                  "peer": { "kind": "channel", "id": "{{ .DISCORD_CLAW_CHANNEL_ID }}" }
                }
              },
              {
                "agentId": "family",
                "match": {
                  "channel": "discord",
                  "guildId": "{{ .DISCORD_GUILD_ID }}",
                  "peer": { "kind": "channel", "id": "{{ .DISCORD_FAMILY_CHANNEL_ID }}" }
                }
              },
              {
                "agentId": "coach",
                "match": {
                  "channel": "discord",
                  "guildId": "{{ .DISCORD_GUILD_ID }}",
                  "peer": { "kind": "channel", "id": "{{ .DISCORD_COACH_CHANNEL_ID }}" }
                }
              },
              {
                "agentId": "finance",
                "match": {
                  "channel": "discord",
                  "guildId": "{{ .DISCORD_GUILD_ID }}",
                  "peer": { "kind": "channel", "id": "{{ .DISCORD_FINANCE_CHANNEL_ID }}" }
                }
              },
              {
                "agentId": "shopping",
                "match": {
                  "channel": "discord",
                  "guildId": "{{ .DISCORD_GUILD_ID }}",
                  "peer": { "kind": "channel", "id": "{{ .DISCORD_SHOPPING_CHANNEL_ID }}" }
                }
              }
            ],
            "models": {
              "mode": "merge",
              "providers": {
                "localai": {
                  "baseUrl": "http://t30.internal:8080/v1",
                  "apiKey": "localai",
                  "api": "openai-completions",
                  "models": [
                    { "id": "qwen3.5-9b", "name": "Qwen3.5 9B", "reasoning": false, "input": ["text"], "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 }, "contextWindow": 131072, "maxTokens": 8192 }
                  ]
                },
                "minimax": {
                  "baseUrl": "https://api.minimax.io/anthropic",
                  "apiKey": "{{ .MINIMAX_API_KEY }}",
                  "api": "anthropic-messages",
                  "models": [
                    { "id": "MiniMax-M2.7", "name": "MiniMax M2.7", "reasoning": true, "input": ["text"], "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 }, "contextWindow": 200000, "maxTokens": 8192 },
                    { "id": "MiniMax-VL-01", "name": "MiniMax VL-01", "reasoning": true, "input": ["text", "image"], "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 }, "contextWindow": 200000, "maxTokens": 8192 }
                  ]
                }
              }
            },
            "plugins": {
              "allow": [
                "discord",
                "composio"
              ],
              "entries": {
                "discord": { "enabled": true },
                "composio": {
                  "enabled": true,
                  "config": {
                    "consumerKey": "{{ .COMPOSIO_API_KEY }}"
                  }
                }
              }
            },
            "mcp": {
              "servers": {
                "grafana": {
                  "transport": "sse",
                  "url": "http://grafana-mcp.observability:8000/sse"
                }
              }
            },
            "session": {
              "dmScope": "per-channel-peer",
              "reset": {
                "mode": "idle",
                "idleMinutes": 1440
              },
              "maintenance": {
                "mode": "enforce",
                "pruneAfter": "7d",
                "maxEntries": 1000,
                "rotateBytes": "100mb",
                "resetArchiveRetention": "7d"
              }
            },
            "logging": {
              "level": "trace",
              "consoleLevel": "trace",
              "consoleStyle": "compact",
              "redactSensitive": "tools"
            },
            "tools": {
              "agentToAgent": {
                "enabled": true,
                "allow": ["main", "devops", "family", "coach", "finance", "shopping"]
              },
              "sessions": {
                "visibility": "all"
              },
              "exec": {
                "security": "full",
                "ask": "off",
                "strictInlineEval": false
              },
              "elevated": {
                "enabled": true,
                "allowFrom": {
                  "discord": ["DISCORD_MATT_USER_ID"]
                }
              }
            },
            "hooks": {
              "enabled": true,
              "path": "/hooks",
              "token": "{{ .OPENCLAW_WEBHOOK_TOKEN }}",
              "defaultSessionKey": "hook:ingress",
              "allowedAgentIds": ["devops"]
            },
            "commands": {
              "native": "auto",
              "nativeSkills": "auto",
              "restart": false,
              "allowFrom": {
                "discord": ["user:{{ .DISCORD_MATT_USER_ID }}"]
              }
            },
            "channels": {
              "discord": {
                "enabled": true,
                "token": "{{ .DISCORD_BOT_TOKEN }}",
                "actions": {
                  "messages": true,
                  "channels": true,
                  "search": true,
                  "reactions": false,
                  "stickers": false,
                  "polls": false,
                  "permissions": false,
                  "threads": false,
                  "pins": false,
                  "memberInfo": false,
                  "roleInfo": false,
                  "roles": false,
                  "channelInfo": false,
                  "voiceStatus": false,
                  "events": false,
                  "moderation": false,
                  "emojiUploads": false,
                  "stickerUploads": false
                },
                "blockStreaming": true,
                "streaming": "block",
                "groupPolicy": "allowlist",
                "dmPolicy": "allowlist",
                "allowFrom": ["{{ .DISCORD_MATT_USER_ID }}", "{{ .DISCORD_AGNES_USER_ID }}"],
                "execApprovals": {
                  "enabled": true,
                  "agentFilter": ["main", "devops", "family", "coach", "finance", "shopping"],
                  "approvers": ["{{ .DISCORD_MATT_USER_ID }}", "{{ .DISCORD_AGNES_USER_ID }}"],
                  "target": "channel"
                },
                "guilds": {
                  "{{ .DISCORD_GUILD_ID }}": {
                    "users": [
                      "{{ .DISCORD_MATT_USER_ID }}",
                      "{{ .DISCORD_AGNES_USER_ID }}"
                    ],
                    "channels": {
                      "{{ .DISCORD_DEVOPS_CHANNEL_ID }}": {
                        "allow": true,
                        "requireMention": false,
                        "skills": ["search", "docs", "github"],
                        "systemPrompt": "Tu es l'expert DevOps. Priorise la sécurité et la stabilité de l'infrastructure."
                      },
                      "{{ .DISCORD_CLAW_CHANNEL_ID }}": {
                        "allow": true,
                        "requireMention": false,
                        "skills": ["search", "docs"],
                        "systemPrompt": "Tu es mon assistant personnel. Aide moi dans ma vie quotidienne, que ce soit pour organiser mes idées, faire des recherches, ou m'assister dans mes projets personnels. Sois polyvalent et fiable."
                      },
                      "{{ .DISCORD_FAMILY_CHANNEL_ID }}": {
                        "allow": true,
                        "requireMention": false,
                        "skills": ["search", "docs"],
                        "systemPrompt": "Tu es l'assistant familial. Sois chaleureux, empathique et aide les membres de la famille dans leur quotidien."
                      },
                      "{{ .DISCORD_COACH_CHANNEL_ID }}": {
                        "allow": true,
                        "requireMention": false,
                        "skills": ["search", "docs"],
                        "systemPrompt": "Tu es mon coach personnel. Aide moi à atteindre mes objectifs, que ce soit en développement personnel, en apprentissage ou dans mes projets. Sois motivant et pédagogue."
                      },
                      "{{ .DISCORD_FINANCE_CHANNEL_ID }}": {
                        "allow": true,
                        "requireMention": false,
                        "skills": ["search", "docs"],
                        "systemPrompt": "Tu es un expert en finance et investissement. Sois pédagogue et explique ton raisonnement."
                      },
                      "{{ .DISCORD_SHOPPING_CHANNEL_ID }}": {
                        "allow": true,
                        "requireMention": false,
                        "skills": ["search", "docs"],
                        "systemPrompt": "Tu es un assistant de shopping. Sois aimable et aide les utilisateurs à trouver ce qu'ils cherchent."
                      }
                    }
                  }
                }
              }
            },
            "meta": {
              "lastTouchedVersion": "2026.3.28",
              "lastTouchedAt": "2026-03-29T13:35:23.088Z"
            }
          }
  dataFrom:
    - extract:
        key: openclaw
