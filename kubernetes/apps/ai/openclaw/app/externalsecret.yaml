---
# yaml-language-server: $schema=https://k8s-schemas.oxygn.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-secret
    template:
      engineVersion: v2
      data:
        ## Gateway token for authentication
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        ##Discord
        DISCORD_BOT_TOKEN: "{{ .DISCORD_BOT_TOKEN }}"
        ## Github Access
        GITHUB_APP_ID: "{{ .GITHUB_APP_ID }}"
        GITHUB_APP_INSTALLATION_ID: "{{ .GITHUB_APP_INSTALLATION_ID }}"
        GITHUB_APP_PRIVATE_KEY: |-
          {{ .GITHUB_APP_PRIVATE_KEY }}
        ## Google Access
        GOG_ACCOUNT: "{{ .GOG_ACCOUNT }}"
        GOG_REFRESH_TOKEN: "{{ .GOG_REFRESH_TOKEN }}"
        GEMINI_API_KEY: "{{ .GEMINI_API_KEY }}"
        ## Todoist
        TODOIST_API_TOKEN: "{{ .TODOIST_API_TOKEN }}"
        ## 1password
        OP_SERVICE_ACCOUNT_TOKEN: "{{ .OP_SERVICE_ACCOUNT_TOKEN }}"
        ## Anthropic
        ANTHROPIC_API_KEY: "{{ .ANTHROPIC_API_KEY }}"
        ## Minimax
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
  dataFrom:
    - extract:
        key: openclaw
---
# yaml-language-server: $schema=https://k8s-schemas.oxygn.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-gog
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-gog-secret
    template:
      engineVersion: v2
      data:
        gog-credentials.json: "{{ .GOG_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: openclaw
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        ## OpenClaw configuration file
        openclaw.json: |
          {
            "gateway": {
              "auth": {
                "mode": "token",
                "token": "{{ .OPENCLAW_GATEWAY_TOKEN }}"
              },
              "tools": {
                "allow": ["sessions_send"]
              },
              "controlUi": {
                "allowedOrigins": [
                  "https://claw.oxygn.dev",
                  "https://claw-code.oxygn.dev"
                ]
              },
              "mode": "local",
              "port": 18789,
              "trustedProxies": ["10.42.0.0/16", "10.10.0.0/16"]
            },
            "browser": {
              "enabled": true,
              "defaultProfile": "default",
              "profiles": {
                "default": {
                  "cdpUrl": "http://localhost:9222",
                  "color": "#4285F4"
                }
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "minimax/MiniMax-M2.5",
                },
                "models": {
                  "minimax/MiniMax-M2.5": { "alias": "minimax" }
                },
                "memorySearch": {
                  "provider": "local",
                  "local": { "modelPath": "hf:ggml-org/embeddinggemma-300M-GGUF/embeddinggemma-300M-Q8_0.gguf" },
                  "fallback": "gemini",
                  "model": "gemini-embedding-001",
                  "sync": { "watch": true },
                  "query": {
                    "hybrid": {
                      "enabled": true,
                      "vectorWeight": 0.7,
                      "textWeight": 0.3
                    }
                  }
                },
                "contextPruning": {
                  "mode": "cache-ttl",
                  "ttl": "6h",
                  "keepLastAssistants": 4,
                  "softTrimRatio": 0.3,
                  "hardClearRatio": 0.5,
                  "minPrunableToolChars": 50000,
                  "softTrim": {
                    "maxChars": 4000,
                    "headChars": 1500,
                    "tailChars": 1500
                  },
                  "hardClear": {
                    "enabled": true,
                    "placeholder": "[Old tool result content cleared]"
                  }
                },
                "compaction": {
                  "mode": "safeguard",
                  "reserveTokensFloor": 24000,
                  "memoryFlush": {
                    "enabled": true,
                    "softThresholdTokens": 12000,
                    "prompt": "Extract key decisions, state changes, lessons, blockers to memory/YYYY-MM-DD.md. Format: ## [HH:MM] Topic. Skip routine work. NO_FLUSH if nothing important.",
                    "systemPrompt": "Compacting session context. Extract only what's worth remembering. No fluff."
                  }
                },
                "maxConcurrent": 2,
                "subagents": {
                  "archiveAfterMinutes": 120,
                  "model": "minimax/MiniMax-M2.5",
                  "maxConcurrent": 3,
                  "thinking": "low"
                },
                "timeoutSeconds": 300,
                "userTimezone": "UTC+1",
                "timeoutSeconds": 600,
                "memorySearch": {
                  "provider": "gemini",
                  "model": "gemini-embedding-001",
                  "fallback": "local",
                  "local": {
                    "modelPath": "hf:ggml-org/embeddinggemma-300M-GGUF/embeddinggemma-300M-Q8_0.gguf"
                  },
                  "sync": {
                    "watch": true
                  },
                  "query": {
                    "hybrid": {
                      "enabled": true,
                      "vectorWeight": 0.7,
                      "textWeight": 0.3
                    }
                  }
                }
              },
              "list": [
                {
                  "id": "main",
                  "default": true,
                  "name": "Claw",
                  "identity": {
                    "name": "OpenClaw",
                    "emoji": "🦞"
                  },
                  "model": {
                    "primary": "minimax/MiniMax-M2.5",
                  },
                  "heartbeat": {
                    "every": "1h",
                    "target": "discord",
                    "to": "channel:{{ .DISCORD_CLAW_CHANNEL_ID }}",
                    "activeHours": { "start": "06:00", "end": "22:00" }
                  },
                  "workspace": "/home/node/.openclaw/workspace",
                  "agentDir": "/home/node/.openclaw/agents/main/agent"
                },
                {
                  "id": "devops",
                  "name": "DevOps SRE",
                  "workspace": "/home/node/.openclaw/workspace-devops",
                  "agentDir": "/home/node/.openclaw/agents/devops/agent",
                  "model": {
                    "primary": "minimax/MiniMax-M2.5"
                  },
                  "identity": {
                    "name": "DevOps Bot",
                    "emoji": "🛠️"
                  },
                  "groupChat": {
                    "mentionPatterns": ["@devops", "@sre"]
                  },
                  "heartbeat": {
                    "every": "30m",
                    "prompt": "Run: bash /home/node/.openclaw/workspace-devops/scripts/heartbeat-check.sh. Follow rules in HEARTBEAT.md to interpret output. HEARTBEAT_OK if all clear.",
                    "target": "discord",
                    "to": "channel:{{ .DISCORD_DEVOPS_CHANNEL_ID }}",
                    "activeHours": { "start": "06:00", "end": "22:00" }
                  },
                  "security": "full",
                  "ask": "on-miss",
                  "askFallback": "deny",
                  "autoAllowSkills": true
                },
                {
                  "id": "family",
                  "name": "Family",
                  "workspace": "/home/node/.openclaw/workspace-family",
                  "agentDir": "/home/node/.openclaw/agents/family/agent",
                  "model": {
                    "primary": "minimax/MiniMax-M2.5"
                  },
                  "identity": {
                    "name": "Family Bot",
                    "emoji": "🏠"
                  },
                  "groupChat": {
                    "mentionPatterns": ["@family", "@familybot"]
                  },
                  "heartbeat": {
                    "every": "6h",
                    "target": "discord",
                    "to": "channel:{{ .DISCORD_FAMILY_CHANNEL_ID }}",
                    "activeHours": { "start": "06:00", "end": "22:00" }
                  }
                },
                {
                  "id": "coach",
                  "name": "Mentor",
                  "workspace": "/home/node/.openclaw/workspace-coach",
                  "agentDir": "/home/node/.openclaw/agents/coach/agent",
                  "model": {
                    "primary": "minimax/MiniMax-M2.5"
                  },
                  "identity": {
                    "name": "Coach",
                    "emoji": "🎓"
                  },
                  "groupChat": {
                    "mentionPatterns": ["@coach", "@coachbot"]
                  },
                  "heartbeat": {
                    "every": "6h",
                    "target": "discord",
                    "to": "channel:{{ .DISCORD_COACH_CHANNEL_ID }}",
                    "activeHours": { "start": "06:00", "end": "22:00" }
                  }
                }
              ]
            },
            "bindings": [
              {
                "agentId": "devops",
                "match": {
                  "channel": "discord",
                  "guildId": "{{ .DISCORD_GUILD_ID }}",
                  "peer": { "kind": "channel", "id": "{{ .DISCORD_DEVOPS_CHANNEL_ID }}" }
                }
              },
              {
                "agentId": "main",
                "match": {
                  "channel": "discord",
                  "guildId": "{{ .DISCORD_GUILD_ID }}",
                  "peer": { "kind": "channel", "id": "{{ .DISCORD_CLAW_CHANNEL_ID }}" }
                }
              },
              {
                "agentId": "family",
                "match": {
                  "channel": "discord",
                  "guildId": "{{ .DISCORD_GUILD_ID }}",
                  "peer": { "kind": "channel", "id": "{{ .DISCORD_FAMILY_CHANNEL_ID }}" }
                }
              },
              {
                "agentId": "coach",
                "match": {
                  "channel": "discord",
                  "guildId": "{{ .DISCORD_GUILD_ID }}",
                  "peer": { "kind": "channel", "id": "{{ .DISCORD_COACH_CHANNEL_ID }}" }
                }
              }
            ],
            "models": {
              "providers": {
                "localai": {
                  "baseUrl": "http://t30.internal:8080/",
                  "apiKey": "local",
                  "api": "anthropic-messages",
                  "models": [
                    { "id": "qwen3.5-9b", "name": "Qwen3.5 9B", "reasoning": true, "input": ["text"], "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 }, "contextWindow": 32656, "maxTokens": 16384 },
                  ]
                },
                "minimax": {
                  "baseUrl": "https://api.minimax.io/anthropic",
                  "apiKey": "{{ .MINIMAX_API_KEY }}",
                  "api": "anthropic-messages",
                  "models": [
                    { "id": "MiniMax-M2.5", "name": "MiniMax M2.5", "reasoning": false, "input": ["text"], "cost": { "input": 15, "output": 60, "cacheRead": 2, "cacheWrite": 10 }, "contextWindow": 200000, "maxTokens": 8192 }
                  ]
                }
              }
            },
            "session": {
              "dmScope": "per-channel-peer",
              "reset": {
                "mode": "idle",
                "idleMinutes": 60
              }
            },
            "logging": {
              "level": "trace",
              "consoleLevel": "trace",
              "consoleStyle": "compact",
              "redactSensitive": "tools"
            },
            "tools": {
              "agentToAgent": {
                "enabled": true,
                "allow": ["main", "devops", "family", "coach"]
              }
            },
            "hooks": {
              "enabled": true,
              "path": "/hooks/github-issues",
              "token": "{{ .GITHUB_ISSUES_WEBHOOK_SECRET }}",
              "defaultSessionKey": "devops"
            },
            "plugins": {
              "entries": {
                "discord": {
                  "enabled": true
                }
              }
            },
            "approvals": {
              "exec": {
                "enabled": true,
                "mode": "session",
                "agentFilter": ["main", "devops", "family", "coach"],
                "sessionFilter": ["discord"],
                "targets": [
                  { "channel": "discord", "to": "{{ .DISCORD_MATT_USER_ID }}" }
                ]
              }
            },
            "channels": {
              "discord": {
                "enabled": true,
                "token": "{{ .DISCORD_BOT_TOKEN }}",
                "actions": {
                  "messages": true,
                  "channels": true,
                  "search": true,
                  "reactions": false,
                  "stickers": false,
                  "polls": false,
                  "permissions": false,
                  "threads": false,
                  "pins": false,
                  "memberInfo": false,
                  "roleInfo": false,
                  "roles": false,
                  "channelInfo": false,
                  "voiceStatus": false,
                  "events": false,
                  "moderation": false,
                  "emojiUploads": false,
                  "stickerUploads": false
                },
                "blockStreaming": true,
                "groupPolicy": "allowlist",
                "dmPolicy": "allowlist",
                "allowFrom": ["{{ .DISCORD_MATT_USER_ID }}", "{{ .DISCORD_AGNES_USER_ID }}"],
                "guilds": {
                  "{{ .DISCORD_GUILD_ID }}": {
                    "users": [
                      "{{ .DISCORD_MATT_USER_ID }}",
                      "{{ .DISCORD_AGNES_USER_ID }}"
                    ],
                    "channels": {
                      "{{ .DISCORD_DEVOPS_CHANNEL_ID }}": {
                        "allow": true,
                        "requireMention": false,
                        "skills": ["search", "docs", "github"],
                        "systemPrompt": "Tu es l'expert DevOps. Priorise la sécurité et la stabilité de l'infrastructure."
                      },
                      "{{ .DISCORD_CLAW_CHANNEL_ID }}": {
                        "allow": true,
                        "requireMention": false,
                        "skills": ["search", "docs"],
                        "systemPrompt": "Keep answers short."
                      },
                      "{{ .DISCORD_FAMILY_CHANNEL_ID }}": {
                        "allow": true,
                        "requireMention": false,
                        "skills": ["search", "docs"],
                        "systemPrompt": "Keep answers short."
                      }
                    }
                  }
                }
              }
            }
          }
  dataFrom:
    - extract:
        key: openclaw
