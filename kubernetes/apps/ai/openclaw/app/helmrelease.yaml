---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  chartRef:
    kind: OCIRepository
    name: openclaw
  interval: 1h
  values:
    controllers:
      openclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          install-tools:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.4.25@sha256:ed18856fd11378ede189514c65b585e90124303a195e2e9222804e64614f5a66
            command:
              - /bin/sh
              - -c
              - |
                # ============================================================
                # Runtime Dependencies
                # ============================================================
                # Some skills require additional runtimes (Python, Go, etc.)
                # Install them here so they persist across pod restarts.
                #
                set -e
                mkdir -p /home/node/.local/bin /home/node/.local/go

                echo "Starting tool installation..."

                # Install gh CLI if not present on PVC
                if [ ! -f /home/node/.local/bin/gh ]; then
                  echo "Installing gh CLI..."
                  cd /tmp
                  curl -fsSL https://github.com/cli/cli/releases/download/v2.86.0/gh_2.86.0_linux_amd64.tar.gz -o gh.tar.gz
                  tar xzf gh.tar.gz
                  cp gh_2.86.0_linux_amd64/bin/gh /home/node/.local/bin/
                  rm -rf gh.tar.gz gh_2.86.0_linux_amd64
                fi

                # Install Go if not present on PVC
                if [ ! -f /home/node/.local/go/bin/go ]; then
                  echo "Installing Go..."
                  cd /tmp
                  curl -fsSL https://go.dev/dl/go1.23.5.linux-amd64.tar.gz -o go.tar.gz
                  tar xzf go.tar.gz
                  mv go /home/node/.local/
                  rm -rf go.tar.gz
                fi

                # Install Homebrew if not present on PVC
                if [ ! -f /home/node/.local/homebrew/bin/brew ]; then
                  echo "Installing Homebrew..."
                  export HOMEBREW_PREFIX=/home/node/.local/homebrew
                  export HOMEBREW_CELLAR=/home/node/.local/homebrew/Cellar
                  export HOMEBREW_REPOSITORY=/home/node/.local/homebrew
                  mkdir -p $HOMEBREW_PREFIX
                  cd /tmp
                  git clone --depth 1 https://github.com/Homebrew/brew $HOMEBREW_PREFIX
                fi

                # Check if pip is available (either standalone or via python3 -m pip)
                set +e # Don't fail on pip errors
                if command -v pip3 >/dev/null 2>&1 || command -v pip >/dev/null 2>&1 || python3 -m pip --version >/dev/null 2>&1; then
                  echo "pip is available"
                else
                  echo "Installing pip..."
                  cd /tmp
                  curl -fsSL https://bootstrap.pypa.io/get-pip.py -o get-pip.py
                  python3 get-pip.py --user --no-warn-script-location --break-system-packages || \
                  python3 get-pip.py --user --no-warn-script-location || \
                  echo "pip install skipped (use python3 -m pip instead)"
                  rm -f get-pip.py
                fi
                set -e # Re-enable error checking

                # Copy openclaw-cli to emptydir for mission-control access
                set +e # Don't fail on error
                echo "Copying openclaw CLI to emptydir volume..."
                mkdir -p /tmp/openclaw-cli
                cp -r /app/* /tmp/openclaw-cli/
                echo "Creating symlink..."
                rm /home/node/.local/bin/openclaw
                ln -s /tmp/openclaw-cli/openclaw.mjs /home/node/.local/bin/openclaw
                set -e # Re-enable error checking

                echo "Tool installation complete"

                # Ensure config directory exists
                mkdir -p /home/node/.openclaw
                echo "Init container completed successfully"
          daemon:
            image:
              repository: docker
              tag: 29.4.1-dind@sha256:c77e5d7912f9b137cc67051fdc2991d8f5ae22c55ddf532bb836dcb693a04940
            restartPolicy: Always
            env:
              DOCKER_TLS_CERTDIR: /certs
            securityContext:
              privileged: true
              runAsUser: 0
              runAsGroup: 0
              allowPrivilegeEscalation: true
            probes:
              startup:
                enabled: true
                custom: true
                spec: &dockerProbe
                  exec:
                    command: ["docker", "info"]
                  periodSeconds: 2
                  timeoutSeconds: 3
                  failureThreshold: 60
              readiness:
                enabled: true
                custom: true
                spec:
                  <<: *dockerProbe
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 3
              liveness:
                enabled: true
                custom: true
                spec:
                  <<: *dockerProbe
                  periodSeconds: 20
                  timeoutSeconds: 3
                  failureThreshold: 3

        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.4.25@sha256:ed18856fd11378ede189514c65b585e90124303a195e2e9222804e64614f5a66
            command:
              - /bin/sh
              - -c
              - |
                # Start gateway
                echo "Starting OpenClaw gateway..."
                exec node dist/index.js gateway --bind lan
            env:
              OPENCLAW_LOG_LEVEL: debug
              BROWSER_WS_ENDPOINT: "ws://localhost:9222"
              DOCKER_HOST: "tcp://localhost:2376"
              DOCKER_CERT_PATH: /certs/client
              DOCKER_TLS_VERIFY: "1"
              GOPATH: /home/node/go
              HOME: &homepath /home/node
              HOMEBREW_CELLAR: /home/node/.local/homebrew/Cellar
              HOMEBREW_PREFIX: /home/node/.local/homebrew
              HOMEBREW_REPOSITORY: /home/node/.local/homebrew
              OPENCLAW_GATEWAY_PORT: &port 18789
              PATH: /home/node/.local/bin:/home/node/.local/go/bin:/home/node/.local/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              TERM: xterm-256color
              TZ: &tz Europe/Paris
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
                cpu: 2000m

          # -- Chromium sidecar for browser automation (CDP on port 9222)
          chrome:
            image:
              repository: zenika/alpine-chrome
              tag: with-node
            command:
              - chromium-browser
              - --headless=new
              - --disable-gpu
              - --remote-debugging-address=0.0.0.0
              - --remote-debugging-port=9222
              - --no-sandbox
              - --disable-dev-shm-usage
              # Stealth flags to reduce bot detection
              - --disable-blink-features=AutomationControlled
              - --user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
              # Allow WebSocket connections from any origin
              - --remote-allow-origins=*
            env:
              TZ: *tz
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi

          mission-control:
            image:
              repository: ghcr.io/builderz-labs/mission-control
              tag: sha-30ecc3d
              # repository: ghcr.io/joryirving/mission-control
              # tag: 2.0.1@sha256:36e8ecbbd850d44d2f29a01834a6a735d152c4bf0f480786145b4aa9a9bc2043
            env:
              PATH: "/home/node/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/local/sbin:/usr/sbin:/sbin"
              OPENCLAW_GATEWAY_HOST: "127.0.0.1"
              OPENCLAW_GATEWAY_PORT: "18789"
              OPENCLAW_STATE_DIR: "/home/node/.openclaw"
              OPENCLAW_CONFIG_PATH: "/home/node/.openclaw/openclaw.json"
              NEXT_PUBLIC_GATEWAY_URL: "wss://claw.oxygn.dev"
              NEXT_PUBLIC_GATEWAY_CLIENT_ID: "mission-control"
              MC_ALLOWED_HOSTS: "claw-control.oxygn.dev,localhost,127.0.0.1"
              LOG_LEVEL: "debug"
            envFrom:
              - secretRef:
                  name: mission-control-secret
            resources:
              requests:
                cpu: 100m
                memory: 256Mi

          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.117.0@sha256:e6702766518b961c7e3c41095c129c7c9a82b041578c53326c52fa363a057727
            env:
              TZ: *tz
            args:
              [
                "--auth",
                "none",
                "--user-data-dir",
                "/home/node/.vscode",
                "--extensions-dir",
                "/home/node/.vscode",
                "--port",
                "12321",
                "/home/node/.openclaw",
              ]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    defaultPodOptions:
      shareProcessNamespace: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.10.98.190
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: *port
          mission-control:
            port: &missioncontrolPort 3000
          codeserver:
            port: &codeserverPort 12321
    route:
      main:
        hostnames:
          - "claw.oxygn.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: "{{ .Release.Name }}"
                port: *port
      codeserver:
        hostnames:
          - "claw-code.oxygn.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: "{{ .Release.Name }}"
                port: *codeserverPort
      mission-control:
        hostnames:
          - "claw-control.oxygn.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: "{{ .Release.Name }}"
                port: *missioncontrolPort

    rbac:
      roles:
        openclaw-read-all:
          type: ClusterRole
          rules:
            # Broad read-only access across cluster resources. Secrets intentionally excluded.
            - apiGroups: [""]
              resources: ["pods", "pods/log", "nodes", "services", "namespaces", "configmaps", "persistentvolumes", "persistentvolumeclaims", "endpoints", "resourcequotas", "limitranges", "serviceaccounts", "events"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apps"]
              resources: ["deployments", "daemonsets", "statefulsets", "replicasets", "controllerrevisions"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["batch"]
              resources: ["jobs", "cronjobs"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses", "ingressclasses", "networkpolicies"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["storage.k8s.io"]
              resources: ["storageclasses", "csinodes", "csidrivers", "volumeattachments"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["autoscaling"]
              resources: ["horizontalpodautoscalers"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["policy"]
              resources: ["poddisruptionbudgets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["coordination.k8s.io"]
              resources: ["leases"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apiextensions.k8s.io"]
              resources: ["customresourcedefinitions"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apiregistration.k8s.io"]
              resources: ["apiservices"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["metrics.k8s.io"]
              resources: ["nodes", "pods"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources: ["helmreleases"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["kustomize.toolkit.fluxcd.io"]
              resources: ["kustomizations"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["gitrepositories", "helmrepositories", "ocirepositories", "buckets", "helmcharts"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["external-secrets.io"]
              resources: ["externalsecrets", "secretstores", "clustersecretstores"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["monitoring.coreos.com"]
              resources: ["prometheuses", "alertmanagers", "servicemonitors", "podmonitors", "prometheusrules", "thanosrulers", "probes"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["snapshot.storage.k8s.io"]
              resources: ["volumesnapshots", "volumesnapshotcontents", "volumesnapshotclasses"]
              verbs: ["get", "list", "watch"]
        openclaw-write-restricted:
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["delete"]
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["patch", "update"]
      bindings:
        openclaw-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: openclaw-read-all
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
        openclaw-write-restricted:
          type: RoleBinding
          roleRef:
            identifier: openclaw-write-restricted
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
    serviceAccount:
      openclaw: {}
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: *homepath
      openclaw-config:
        type: secret
        name: "{{ .Release.Name }}-config"
        defaultMode: 0400
        globalMounts:
          - path: /home/node/.openclaw/openclaw.json
            subPath: openclaw.json
      mission-control:
        existingClaim: "mission-control-data"
        globalMounts:
          - path: /app/.data
      next-cache:
        type: emptyDir
        globalMounts:
          - path: /app/.next/cache
      documents:
        type: nfs
        server: funkstation.internal
        path: /volume2/Documents
        globalMounts:
          - path: /documents
      tmp:
        type: emptyDir
      certs:
        type: emptyDir
