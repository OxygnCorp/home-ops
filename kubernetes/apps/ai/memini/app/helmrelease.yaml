---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app memini
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 15m
  upgrade:
    force: true
  values:
    global:
      fullnameOverride: *app
    controllers:
      main:
        containers:
          main:
            env:
              MEMINI_BACKEND: sqlite
              MEMINI_DEFAULT_NAMESPACE: default
              MEMINI_EMBED_BASE_URL: http://qwen3-embedding-0.6b.ai.svc.cluster.local:8080/v1
              MEMINI_EMBED_MODEL: qwen3-embedding-0.6b
              MEMINI_EMBED_DIMS: "1024"
              MEMINI_EMBED_QUERY_PREFIX: "Instruct: Given a user message, retrieve relevant past memories\nQuery: "
              MEMINI_EMBED_MAX_CONCURRENCY: "2"
              MEMINI_RECALL_EMBED_TIMEOUT: 10s
              MEMINI_RERANK: http://qwen3-reranker-0.6b.ai.svc.cluster.local:8080/v1
              MEMINI_RERANK_MODEL: qwen3-reranker-0.6b
              MEMINI_RERANK_MAX_CONCURRENCY: "2"
              MEMINI_RERANK_TIMEOUT: 8s
              MEMINI_WRITE_DEDUP_SCORE: "0.80"
              MEMINI_WRITE_DEDUP_ACTION: coalesce
              MEMINI_LLM_BASE_URL: http://litellm.ai:4000/v1
              MEMINI_LLM_MODEL: dsv4f
              MEMINI_LLM_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: *app
                    key: MEMINI_LLM_API_KEY
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: *app
                    key: MEMINI_API_KEY
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 180
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
      fsck:
        enabled: true
        cronjob:
          schedule: "0 5 * * *"
        containers:
          fsck:
            env:
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: *app
                    key: MEMINI_API_KEY
    persistence:
      data:
        existingClaim: *app
    serviceMonitor:
      main:
        enabled: true
    grafanaDashboards:
      enabled: true
      folder: ai
    route:
      ui:
        enabled: true
        hostnames:
          - memini.oxygn.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
