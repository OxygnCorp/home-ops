---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headroom
spec:
  chartRef:
    kind: OCIRepository
    name: headroom
  interval: 30m
  values:
    controllers:
      headroom:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/chopratejas/headroom
              tag: code
            # args:
            #   - --no-optimize #TODO : temporarily disable optimizations to prevent crashes - see https://github.com/chopratejas/headroom/issues/1005
            env:
              TZ: Europe/Paris
              HEADROOM_HOST: 0.0.0.0
              HEADROOM_PORT: "8787"
              OPENAI_TARGET_API_URL: http://litellm.ai:4000/v1
              ANTHROPIC_TARGET_API_URL: http://litellm.ai:4000
              HEADROOM_REQUIRE_RUST_CORE: "true" # Requires AVX2 — pinned to k8s-3 (Skylake E3-1275 v5) via nodeAffinity below
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8787
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8787
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8787
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      # Pin to AVX2-capable nodes (only k8s-3 today). The Rust core of headroom
      # requires AVX2 — the Ivy Bridge-EP control planes (k8s-0/1/2) don't have it.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: oxygen.dev/avx2
                    operator: In
                    values:
                      - "true"
      tolerations:
        - key: workload
          operator: Equal
          value: ai
          effect: NoSchedule
    service:
      app:
        ports:
          http:
            port: 8787
    serviceMonitor:
      app:
        endpoints:
          - interval: 30s
            path: /metrics/
            port: http
            scrapeTimeout: 10s
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.oxygn.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 8787                  # → Headroom proxy port
