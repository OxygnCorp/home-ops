---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/model_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-embedding-0.6b
spec:
  format: gguf
  quantization: Q8_0
  source: https://huggingface.co/Qwen/Qwen3-Embedding-0.6B-GGUF/resolve/main/Qwen3-Embedding-0.6B-Q8_0.gguf
  hardware:
    accelerator: cuda
    gpu:
      count: 1
      enabled: true
      layers: 99
      vendor: nvidia
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/inferenceservice_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-embedding-0.6b
spec:
  modelRef: qwen3-embedding-0.6b
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:5cb4206c0e8beda2592745b60645162cf6b4c2fa4e7e8c2775af83e8015c60a6
  runtimeClassName: nvidia
  replicas: 1
  nodeSelector:
    kubernetes.io/hostname: k8s-3
  tolerations:
    - key: workload
      operator: Equal
      value: ai
      effect: NoSchedule
  contextSize: 2048
  parallelSlots: 1
  batchSize: 1024
  uBatchSize: 1024
  resources:
    gpu: 1
    cpu: 100m
    memory: 1Gi
  extraArgs:
    - --embeddings
    - --pooling
    - last
    - --cache-ram
    - "0"
    - --no-mmap
    - --alias
    - qwen3-embedding-0.6b
    - --metrics
  endpoint:
    port: 8080
    type: ClusterIP
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 60
    liveness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 30
      failureThreshold: 3
    readiness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 3
