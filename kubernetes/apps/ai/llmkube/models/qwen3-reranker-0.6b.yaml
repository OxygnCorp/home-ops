---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/model_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-reranker-0.6b
spec:
  format: gguf
  quantization: Q8_0
  source: https://huggingface.co/ggml-org/Qwen3-Reranker-0.6B-Q8_0-GGUF/resolve/main/qwen3-reranker-0.6b-q8_0.gguf
  hardware:
    accelerator: cuda
    gpu:
      count: 1
      enabled: true
      layers: 99
      vendor: nvidia
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/inferenceservice_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-reranker-0.6b
spec:
  modelRef: qwen3-reranker-0.6b
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:cb64bac9cdb674d0f6a90be0babf1604c830333522d8b4adb840c24b9d08c643
  runtimeClassName: nvidia
  replicas: 1
  nodeSelector:
    kubernetes.io/hostname: k8s-3
  tolerations:
    - key: workload
      operator: Equal
      value: ai
      effect: NoSchedule
  contextSize: 4096
  parallelSlots: 1
  batchSize: 4096
  uBatchSize: 4096
  resources:
    gpu: 1
    cpu: 100m
    memory: 1Gi
  extraArgs:
    - --rerank
    - --pooling
    - rank
    - --cache-ram
    - "0"
    - --no-mmap
    - --alias
    - qwen3-reranker-0.6b
    - --metrics
  endpoint:
    port: 8080
    type: ClusterIP
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 60
    liveness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 30
      failureThreshold: 3
    readiness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 3
