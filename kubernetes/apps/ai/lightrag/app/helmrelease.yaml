---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lightrag
spec:
  chartRef:
    kind: OCIRepository
    name: lightrag
  interval: 1h
  values:
    controllers:
      lightrag:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/hkuds/lightrag
              tag: v1.5.4
            env:
              TZ: Europe/Paris
              # Server
              HOST: 0.0.0.0
              PORT: &port 9621
              WORKING_DIR: /app/data/rag_storage
              INPUT_DIR: /app/data/inputs
              PROMPT_DIR: /app/data/prompts
              # Logging (root filesystem is read-only; write logs to emptyDir)
              LOG_DIR: /tmp
              TIKTOKEN_CACHE_DIR: /app/data/tiktoken
              # LLM via litellm (OpenAI-compatible gateway)
              LLM_BINDING: openai
              LLM_BINDING_HOST: http://litellm.ai.svc.cluster.local:4000/v1
              LLM_MODEL: MiniMax-M3
              MAX_ASYNC_LLM: "4"
              LLM_TIMEOUT: "240"
              # Embeddings via local TEI (OpenAI-compatible)
              EMBEDDING_BINDING: openai
              EMBEDDING_BINDING_HOST: http://embeddings.ai.svc.cluster.local:80
              EMBEDDING_MODEL: BAAI/bge-m3
              EMBEDDING_DIM: "1024"
              EMBEDDING_TOKEN_LIMIT: "8192"
              EMBEDDING_BINDING_API_KEY: not-required
              EMBEDDING_BATCH_NUM: "16"
              EMBEDDING_FUNC_MAX_ASYNC: "4"
              EMBEDDING_TIMEOUT: "120"

            envFrom:
              - secretRef:
                  name: lightrag-secret
            probes:
              # tcpSocket (not httpGet) — robust without asserting an exact
              # health-endpoint path on first deploy.
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              # readOnlyRootFilesystem omitted for first deploy: the image
              # may write Python caches / scratch under / at startup.
              # Durable state is on the data PVC; /tmp is tmpfs below.
              # Revisit with RO rootfs once the image's write paths are
              # confirmed clean.
              seccompProfile:
                type: RuntimeDefault
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      data:
        existingClaim: lightrag
        globalMounts:
          - path: /app/data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - lightrag.oxygn.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
