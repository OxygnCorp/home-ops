---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lightrag
spec:
  chartRef:
    kind: OCIRepository
    name: lightrag
  interval: 1h
  values:
    controllers:
      lightrag:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/hkuds/lightrag
              tag: v1.5.4
            env:
              TZ: Europe/Paris
              # Server
              HOST: 0.0.0.0
              PORT: &port 9621
              WORKING_DIR: /app/data/rag_storage
              INPUT_DIR: /app/data/inputs
              # LLM via litellm (OpenAI-compatible gateway)
              LLM_BINDING: openai
              LLM_BINDING_HOST: http://litellm.ai.svc.cluster.local:4000/v1
              LLM_MODEL: MiniMax-M3
              MAX_ASYNC_LLM: "4"
              LLM_TIMEOUT: "240"
              # Embeddings via local TEI (OpenAI-compatible)
              EMBEDDING_BINDING: openai
              EMBEDDING_BINDING_HOST: http://embeddings.ai.svc.cluster.local:80
              EMBEDDING_MODEL: intfloat/multilingual-e5-base
              EMBEDDING_DIM: "768"
              EMBEDDING_TOKEN_LIMIT: "512"
              EMBEDDING_BINDING_API_KEY: not-required
              EMBEDDING_BATCH_NUM: "16"
              EMBEDDING_FUNC_MAX_ASYNC: "4"
              EMBEDDING_TIMEOUT: "60"
              # Storage backends: Neo4j for graph, file-based for the rest (persisted on PVC)
              LIGHTRAG_GRAPH_STORAGE: Neo4JStorage
              LIGHTRAG_KV_STORAGE: JsonKVStorage
              LIGHTRAG_DOC_STATUS_STORAGE: JsonDocStatusStorage
              LIGHTRAG_VECTOR_STORAGE: NanoVectorDBStorage
              # Neo4j connection (password from secret via envFrom)
              NEO4J_URI: bolt://neo4j.database.svc.cluster.local:7687
              NEO4J_USERNAME: neo4j
              NEO4J_DATABASE: neo4j
              # Logging (root filesystem is read-only; write logs to emptyDir)
              LOG_DIR: /tmp
              # Document processing
              SUMMARY_LANGUAGE: French
              CHUNK_SIZE: "500"
              CHUNK_OVERLAP_SIZE: "100"
              ENTITY_EXTRACTION_USE_JSON: "true"
              MAX_PARALLEL_INSERT: "1"
              ENABLE_LLM_CACHE: "false"
            envFrom:
              - secretRef:
                  name: lightrag-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      data:
        existingClaim: lightrag
        globalMounts:
          - path: /app/data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - lightrag.oxygn.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
