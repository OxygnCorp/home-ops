---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mainclaw
spec:
  chartRef:
    kind: OCIRepository
    name: mainclaw
  interval: 1h
  values:
    controllers:
      openclaw:
        annotations:
          secret.reloader.stakater.com/reload: "mainclaw-secret, mainclaw-config"
          configmap.reloader.stakater.com/reload: "mainclaw-configmap"
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                mkdir -p /home/node/.openclaw
                rm -f /home/node/.openclaw/openclaw.json
                cp /tmp/openclaw.json /home/node/.openclaw/openclaw.json
                chown 1000:100 /home/node/.openclaw/openclaw.json
                chmod 400 /home/node/.openclaw/openclaw.json
                cp /kopiaignore/.kopiaignore /home/node/.kopiaignore

                # Install Mise if not present on PVC
                if [ ! -f /home/node/.local/bin/mise ]; then
                  echo "Installing Mise..."
                  curl https://mise.run | MISE_INSTALL_PATH=/home/node/.local/bin/mise sh
                fi
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.6.11@sha256:3814fb1f62f9cfc5944de088c5817c68c88b5d721feebe36420b666a90a61ce7
            command:
              - /bin/sh
              - -c
              - |
                # Install the memini memory plugin from ClawHub, version-guarded:
                # only fetches when the pinned version differs from what's on the
                # persistent volume, so normal restarts stay offline.
                # renovate: datasource=github-tags depName=eleboucher/memini
                MEMINI_PLUGIN_VERSION=0.6.2
                if [ "$(cat "$HOME/.openclaw/extensions/memini/.clawver" 2>/dev/null)" != "$MEMINI_PLUGIN_VERSION" ]; then
                  if node dist/index.js plugins install "clawhub:@eleboucher/memini@$MEMINI_PLUGIN_VERSION" --pin --force; then
                    printf '%s' "$MEMINI_PLUGIN_VERSION" > "$HOME/.openclaw/extensions/memini/.clawver"
                  else
                    echo "WARN: memini plugin install failed; starting with whatever is present"
                  fi
                fi
                # Start gateway
                echo "Starting OpenClaw gateway..."
                exec node dist/index.js gateway
            env:
              OPENCLAW_LOG_LEVEL: debug
              GOPATH: /home/node/go
              HOME: /home/node
              OPENCLAW_GATEWAY_PORT: 18789
              PATH: /home/node/.local/bin:/home/node/.local/share/mise/shims:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              TERM: xterm-256color
              TZ: Europe/Paris
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 2000m
                memory: 4Gi

          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.127.0@sha256:4193b3a0c2661bce87b3cafede59e7d50e1e99e35f7c10bece7c2a7e0660c0a8
            env:
              TZ: Europe/Paris
            args:
              [
                "--auth",
                "none",
                "--user-data-dir",
                "/home/node/.vscode",
                "--extensions-dir",
                "/home/node/.vscode",
                "--port",
                "12321",
                "/config"
              ]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.10.98.191
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 18789
          codeserver:
            port: 12321
    route:
      main:
        hostnames:
          - "mainclaw.oxygn.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: "{{ .Release.Name }}"
                port: 18789
      codeserver:
        hostnames:
          - "mainclaw-code.oxygn.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: "{{ .Release.Name }}"
                port: 12321
    persistence:
      openclaw-home:
        type: emptyDir
      kopiaignore:
        type: configMap
        name: mainclaw-kopiaignore
        globalMounts:
          - path: /kopiaignore
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /home/node
      data:
        type: nfs
        server: funkstation.internal
        path: /volume1/Agents/mainclaw
        globalMounts:
          - path: /data
      openclaw-config:
        type: secret
        name: "{{ .Release.Name }}-config"
        defaultMode: 0755
        globalMounts:
          - path: /tmp/openclaw.json
            subPath: openclaw.json
