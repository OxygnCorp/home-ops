---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kguardian
spec:
  chartRef:
    kind: OCIRepository
    name: kguardian
  interval: 30m
  values:
    # Controller configuration
    controller:
      # Exclude namespaces from monitoring
      excludedNamespaces:
        - kguardian
        - kube-system
        - observability
        - network
        - rook-ceph
        - trivy-system
        - openebs-system
        - flux-system

      # Enable debug logging
      debug: true

      # -- Ignore traffic from daemonset pods to reduce noise
      ignoreDaemonSet: true

      # Resource limits
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi

    # Broker configuration
    broker:
      replicaCount: 1

      # Resource limits
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi

    # DB configuration
    database:
      # Persistence
      persistence:
        enabled: true
        existingClaim: "kguardian"

    # MCP Server Configuration (Model Context Protocol)
    mcpServer:
      # -- Enable MCP Server for external integrations
      enabled: true
