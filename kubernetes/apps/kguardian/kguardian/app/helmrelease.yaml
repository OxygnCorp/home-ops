---
# yaml-language-server: $schema=https://k8s-schemas.oxygn.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kguardian
spec:
  chartRef:
    kind: OCIRepository
    name: kguardian
  interval: 30m
  values:
    # Controller configuration
    controller:
      # Exclude namespaces from monitoring
      excludedNamespaces:
        - kguardian
        - kube-system
        - observability
        - network
        - rook-ceph
        - trivy-system
        - openebs-system
        - flux-system

      # Enable debug logging
      debug: true

      # -- Ignore traffic from daemonset pods to reduce noise
      ignoreDaemonSet: true

      # Resource limits
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi

    # Broker configuration
    broker:
      replicaCount: 1

      # Resource limits
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi

    # DB configuration
    database:
      # Persistence
      persistence:
        enabled: true
        existingClaim: "kguardian"

    # LLM Bridge service for AI assistant
    llmBridge:
      enabled: true

      secrets:
        # -- Normalized secret key name used for all providers
        keyName: "API_KEY"

        # Google Gemini configuration
        gemini:
          enabled: true
          name: "kguardian-gemini-secret"

    # MCP Server Configuration (Model Context Protocol)
    mcpServer:
      # -- Enable MCP Server for external integrations
      enabled: true
