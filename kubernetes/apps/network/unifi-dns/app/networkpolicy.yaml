---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: unifi-dns
  namespace: network
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: unifi-dns
  policyTypes:
    - Ingress
    - Egress
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # Allow Kubernetes API access
    - to:
        - ipBlock:
            cidr: 10.10.10.0/24
      ports:
        - protocol: TCP
          port: 6443
    # Allow access to Gateway API resources
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network
    # Allow access to Unifi controller
    - to:
        - ipBlock:
            cidr: 10.10.50.0/24
      ports:
        - protocol: TCP
          port: 443