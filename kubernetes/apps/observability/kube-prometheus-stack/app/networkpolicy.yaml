---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus
  namespace: observability
spec:
  podSelector:
    matchLabels:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
    # Allow traffic from other observability components
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
    # Allow ingress from network namespace (if needed)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network
  egress:
    # Allow scrape from all namespaces (metrics collection)
    - to:
        - namespaceSelector: {}
