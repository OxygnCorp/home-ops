---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from Grafana
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
    # Allow traffic from other observability components
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
    # Allow ingress from network namespace (if needed)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # Allow Kubernetes API access
    - to:
        - ipBlock:
            cidr: 10.10.10.0/24
      ports:
        - protocol: TCP
          port: 6443
    # Allow scrape from all namespaces (metrics collection)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9100
        - protocol: TCP
          port: 9153
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 9402
        - protocol: TCP
          port: 9187
        - protocol: TCP
          port: 9999
        - protocol: TCP
          port: 9633
        - protocol: TCP
          port: 10250
        - protocol: TCP
          port: 10258
        - protocol: TCP
          port: 9962
        - protocol: TCP
          port: 9965
        - protocol: TCP
          port: 9283
        - protocol: TCP
          port: 19001
        - protocol: TCP
          port: 5432
