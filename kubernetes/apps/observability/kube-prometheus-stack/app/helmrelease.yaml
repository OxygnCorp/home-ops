# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name kube-prometheus-stack
spec:
  releaseName: *name
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 75.18.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  interval: 1h
  values:
    kubeStateMetrics:
      enabled: false
    grafana:
      enabled: false
    defaultRules:
      etcd: false
      kubernetesSystem: false
    alertmanager:
      enabled: false
    prometheusOperator:
      namespaces:
        releaseNamespace: true
        # avoid duplicate reconciliations and watch all namespaces via explicit allow-list
        allNamespaces: false
        deny:
          - flux-system
          - kube-system
          - network
          - rook-ceph
        allow:
          - ai
          - automation
          - download
          - media
          - observability
          - storage
          - infrastructure
          - cert-manager
          - monitoring
    prometheus:
      service:
        type: ClusterIP
      ingress:
        enabled: false
      route:
        main:
          enabled: true
          hostnames: ["prometheus.oxygn.dev"]
          parentRefs:
            - name: envoy-internal
              namespace: network
      prometheusSpec:
        externalUrl: https://prometheus.oxygn.dev
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        scrapeInterval: 1m # Must match interval in Grafana Helm chart
        retention: 15d
        retentionSize: 45GB
        additionalArgs:
          - name: storage.tsdb.min-block-duration
            value: 2h          # défaut, laisser tel quel
          - name: storage.tsdb.max-block-duration
            value: 24h         # défaut 10% de retention → ~3j avec 30d, réduire peut aider
          - name: query.max-concurrency
            value: "4"         # limiter les queries parallèles qui lisent du disque
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 4Gi
        securityContext:
          fsGroup: 2000
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 2000
          seccompProfile:
            type: RuntimeDefault
        enableRemoteWriteReceiver: false
        enableFeatures:
          - remote-write-receiver
        volumeClaimTemplate:
          spec:
            storageClassName: ceph-block
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 50Gi
        walCompression: true
        excludedFromTargetMatch:
          - serviceName: blackbox-exporter
            namespace: observability
          - serviceName: prometheus-operator-admission-webhook
            namespace: observability
          - serviceName: prometheus-operated
            namespace: observability
        initContainers:
          - name: init-chmod-data
            image: busybox:1.36.1
            command: ["/bin/sh", "-c", "chown -R 1000:2000 /prometheus"]
            volumeMounts:
              - name: prometheus-db
                mountPath: /prometheus
    nodeExporter:
      enabled: false
    coreDns:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeProxy:
      enabled: false
    prometheus-node-exporter:
      enabled: false
    windowsMonitoring:
      enabled: false
    additionalPrometheusRules:
      - name: zfs.rules
        groups:
          - name: zfs
            rules:
              - alert: ZFSPoolNotOnline
                annotations:
                  summary: ZFS pool {{$labels.zpool}} on {{$labels.instance}} is in a unexpected state {{$labels.state}}
                expr: node_zfs_zpool_state{state!="online"} > 0
                labels:
                  severity: critical
