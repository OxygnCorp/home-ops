---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plex-kopiaignore
data:
  .kopiaignore: |
    # Regenerable from web (TMDB/TVDB) - saves ~7GB
    Cache/
    Metadata/

    # Library
    Media/

    # Logs and diagnostics - not needed for restore
    Logs/
    Crash Reports/
    Diagnostics/

    # Auto-downloaded on startup
    Codecs/
    Updates/

    # Misc
    *.log
    *.log.*

    # DB backups
    **/Databases/com.plexapp.plugins.library.db-20*
    **/Databases/com.plexapp.plugins.library.blobs.db-20*
