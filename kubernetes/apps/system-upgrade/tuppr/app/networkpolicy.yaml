---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tuppr
  namespace: system-upgrade
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tuppr
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress (envoy)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network
    # Allow Prometheus metrics scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels: