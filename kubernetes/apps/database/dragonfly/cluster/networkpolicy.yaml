---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dragonfly
  namespace: database
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: dragonfly
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from dragonfly operator
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
          podSelector:
            matchLabels:
              app.kubernetes.io/name: dragonfly-operator
    # Allow traffic from other dragonfly pods (replication)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: dragonfly
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # Allow Kubernetes API access
    - to:
        - ipBlock:
            cidr: 10.10.10.0/24
      ports:
        - protocol: TCP
          port: 6443
    # Allow access to other dragonfly pods (cluster communication)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: dragonfly
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9999
