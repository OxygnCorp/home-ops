---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudnative-pg
  namespace: database
spec:
  podSelector:
    matchLabels:
      postgresql: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from CNPG operator
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
          podSelector:
            matchLabels:
              app.kubernetes.io/name: cloudnative-pg
    # Allow traffic from teslamate (automation namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: automation
    # Allow traffic from Prometheus (observability namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
    # Allow traffic from other postgres pods (replication)
    - from:
        - podSelector:
            matchLabels:
              postgresql: postgres
  egress:
    # Allow DNS resolution (pod)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # Allow DNS resolution (service IP)
    - to:
        - ipBlock:
            cidr: 10.43.0.0/16
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # Allow Kubernetes API access
    - to:
        - ipBlock:
            cidr: 10.10.10.0/24
      ports:
        - protocol: TCP
          port: 6443
    # Allow Kubernetes service access (10.43.0.0/16)
    - to:
        - ipBlock:
            cidr: 10.43.0.0/16
      ports:
        - protocol: TCP
          port: 6443
    # Allow access to other postgres pods (CNPG internal communication)
    - to:
        - podSelector:
            matchLabels:
              postgresql: postgres
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 5432
