---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudnative-pg
  namespace: database
spec:
  podSelector:
    matchLabels:
      postgresql: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from CNPG operator
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
          podSelector:
            matchLabels:
              app.kubernetes.io/name: cloudnative-pg
    # Allow traffic from teslamate (automation namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: automation
    # Allow traffic from other postgres pods (replication)
    - from:
        - podSelector:
            matchLabels:
              postgresql: postgres
  egress:
    # Allow access to other postgres pods (CNPG internal communication)
    - to:
        - podSelector:
            matchLabels:
              postgresql: postgres
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 5432
