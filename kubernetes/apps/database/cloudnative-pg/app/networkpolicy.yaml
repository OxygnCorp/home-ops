---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudnative-pg
  namespace: database
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic within database namespace (webhook, operator)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
  egress:
    # Allow access to all namespaces for database management
    - to:
        - namespaceSelector: {}
    # Allow access to Rook Ceph for storage
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rook-ceph
    # Allow access to OpenEBS for storage
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openebs-system