---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudnative-pg
  namespace: database
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic within database namespace (webhook, operator)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # Allow Kubernetes API access
    - to:
        - ipBlock:
            cidr: 10.10.10.0/24
      ports:
        - protocol: TCP
          port: 6443
    # Allow access to all namespaces for database management
    - to:
        - namespaceSelector: {}
    # Allow access to Rook Ceph for storage
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rook-ceph
    # Allow access to OpenEBS for storage
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openebs-system