---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudnative-pg-policy
  namespace: database
  labels:
    app.kubernetes.io/name: cloudnative-pg
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow internal traffic within cloudnative-pg
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cloudnative-pg
    # Allow automation namespace (teslamate) to access postgres
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: automation
      ports:
        - protocol: TCP
          port: 5432
    # Allow Prometheus to scrape metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
        podSelector:
          matchLabels:
            prometheus: kube-prometheus-stack
  egress:
    # Allow internal traffic within cloudnative-pg
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cloudnative-pg
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
