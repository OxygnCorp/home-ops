---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: helm-controller-ceph
  namespace: rook-ceph
rules:
  - apiGroups:
      - ceph.rook.io
    resources:
      - cephclusters
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: helm-controller-ceph
  namespace: rook-ceph
subjects:
  - kind: ServiceAccount
    name: helm-controller
    namespace: flux-system
roleRef:
  kind: Role
  name: helm-controller-ceph
  apiGroup: rbac.authorization.k8s.io
