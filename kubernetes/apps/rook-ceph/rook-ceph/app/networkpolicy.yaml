---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  podSelector:
    matchLabels:
      app: rook-ceph-operator
  policyTypes:
    - Ingress
    - Egress
  egress:
    # Allow access to Ceph cluster (internal communication)
    - to:
        - ipBlock:
            cidr: 169.254.255.20/32
        - ipBlock:
            cidr: 169.254.255.21/32
        - ipBlock:
            cidr: 169.254.255.22/32
    # Allow access to all namespaces for storage operations
    - to:
        - namespaceSelector: {}