---
# yaml-language-server: $schema=https://k8s-schemas.oxygn.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghostfolio
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: ghostfolio-secret
    template:
      engineVersion: v2
      data:
        JWT_SECRET_KEY: "{{ .JWT_SECRET_KEY }}"
        ACCESS_TOKEN_SALT: "{{ .ACCESS_TOKEN_SALT }}"
        # Postgres
        DATABASE_HOST: &dbHost postgres-rw.database.svc.cluster.local.
        DATABASE_USER: &dbUser "{{ .GHOSTFOLIO_DB_USERNAME }}"
        DATABASE_PASS: &dbPass "{{ .GHOSTFOLIO_DB_PASSWORD }}"
        DATABASE_NAME: &dbName ghostfolio
        # Postgres Init
        INIT_POSTGRES_HOST: *dbHost
        INIT_POSTGRES_DBNAME: *dbName
        INIT_POSTGRES_USER: *dbUser
        INIT_POSTGRES_PASS: *dbPass
        INIT_POSTGRES_SUPER_USER: postgres
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASSWORD }}"
  dataFrom:
    - extract:
        key: cloudnative-pg
    - extract:
        key: ghostfolio
