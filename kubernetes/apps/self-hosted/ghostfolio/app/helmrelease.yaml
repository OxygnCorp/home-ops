---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ghostfolio
spec:
  chartRef:
    kind: OCIRepository
    name: ghostfolio
  interval: 1h
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn: []
  values:
    controllers:
      ghostfolio:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
              pullPolicy: Always
            env:
              INIT_POSTGRES_HOST: "{{ .Release.Name }}-rw.self-hosted.svc.cluster.local"
              INIT_POSTGRES_USER:
                valueFrom:
                    secretKeyRef:
                      name: "{{ .Release.Name }}-app"
                      key: username
              INIT_POSTGRES_PASS:
                valueFrom:
                    secretKeyRef:
                      name: "{{ .Release.Name }}-app"
                      key: password
              INIT_POSTGRES_DBNAME:
                valueFrom:
                    secretKeyRef:
                      name: "{{ .Release.Name }}-app"
                      key: dbname
              INIT_POSTGRES_SUPER_USER:
                valueFrom:
                    secretKeyRef:
                      name: "{{ .Release.Name }}-superuser"
                      key: username
              INIT_POSTGRES_SUPER_PASS:
                valueFrom:
                    secretKeyRef:
                      name: "{{ .Release.Name }}-superuser"
                      key: password
        containers:
          app:
            image:
              repository: docker.io/ghostfolio/ghostfolio
              tag: 3.15.1@sha256:b26215f6d3403ee7480b89bcd08c8f31cd96f10d628229ce422ad835faf8b593
              pullPolicy: IfNotPresent
            env:
              NODE_ENV: production
              TZ: Europe/Paris
              REDIS_HOST: ghostfolio-dragonfly
              REDIS_PORT: "6379"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-app"
                    key: uri
            envFrom:
              - secretRef:
                  name: ghostfolio-secret
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /api/v1/health
              readiness:
                enabled: true
                type: HTTP
                path: /api/v1/health
              startup:
                enabled: true
                type: HTTP
                path: /api/v1/health
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: ghostfolio
        type: ClusterIP
        ports:
          http:
            port: &port 3333
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.oxygn.dev"
          - finance.oxygn.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
