---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actual
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: actual
  values:
    controllers:
      actual:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 100
            fsGroupChangePolicy: "OnRootMismatch"
            runAsGroup: 100
            runAsUser: 1024
        containers:
          app:
            image:
              repository: ghcr.io/actualbudget/actual-server
              tag: edge
              pullPolicy: IfNotPresent
            env:
              TZ: "Europe/Paris"
              ACTUAL_PORT: &httpPort 5006
              DEBUG: "actual:enable-banking:app"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *httpPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 512M
                cpu: 200m
    service:
      app:
        controller: actual
        ports:
          http:
            port: *httpPort
    route:
      app:
        hostnames:
          - actual.oxygn.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
