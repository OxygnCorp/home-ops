---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oikos
spec:
  chartRef:
    kind: OCIRepository
    name: oikos
  interval: 1h
  values:
    controllers:
      oikos:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          patch-auth:
            image:
              repository: ghcr.io/ulsklyc/oikos
              tag: 0.52.5
            command: ["/bin/sh", "-c"]
            args:
              - |
                cp /app/server/auth.js /patch/auth.js
                sed -i '/req.authRole = apiToken.role;/a\    req.session.userId = apiToken.created_by;\n    req.session.role = apiToken.role;' /patch/auth.js
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
        containers:
          app:
            image:
              repository: ghcr.io/ulsklyc/oikos
              tag: 0.52.5
            command: ["node", "server/index.js"]
            env:
              TZ: Europe/Paris
              NODE_ENV: production
              DB_PATH: /data/oikos.db
              BACKUP_DIR: /backups
              SESSION_SECURE: "false"
            envFrom:
              - secretRef:
                  name: oikos
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 3000
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 10
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 30
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
    service:
      app:
        controller: oikos
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - oikos.oxygn.dev
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      data:
        enabled: true
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data
      tmpfs:
        type: emptyDir
        advancedMounts:
          oikos:
            app:
              - path: /backups
                subPath: backups
              - path: /tmp
                subPath: tmp
      patch:
        type: emptyDir
        advancedMounts:
          oikos:
            patch-auth:
              - path: /patch
            app:
              - path: /app/server/auth.js
                subPath: auth.js
