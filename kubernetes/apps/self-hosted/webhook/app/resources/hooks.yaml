---
- id: github-oxygn-renovate
  execute-command: /config/renovate-operator.sh
  pass-arguments-to-command:
    - # job name
      source: string
      name: oxygncorp
    - # namespace
      source: string
      name: renovate
    - # project
      source: payload
      name: repository.full_name
    - # Renovate Operator webhook URL
      source: string
      name: http://renovate-operator.renovate.svc.cluster.local:8082
  trigger-rule:
    and:
      - # Validate the webhook secret
        match:
          type: payload-hmac-sha1
          secret: >-
            {{ getenv "RENOVATE_GITHUB_WEBHOOK_SECRET" | js }}
          parameter:
            source: header
            name: x-hub-signature
      - # Trigger only for the oxygn repo owner
        match:
          type: value
          value: OxygnCorp
          parameter:
            source: payload
            name: repository.owner.login
      - or:
          - # Trigger on GitHub Issue edits
            and:
              - match:
                  type: value
                  value: issues
                  parameter:
                    source: header
                    name: x-github-event
              - match:
                  type: value
                  value: edited
                  parameter:
                    source: payload
                    name: action
              - match:
                  type: value
                  value: open
                  parameter:
                    source: payload
                    name: issue.state
              - match:
                  type: value
                  value: "Renovate Dashboard 🤖"
                  parameter:
                    source: payload
                    name: issue.title
          - # Trigger on GitHub Pull Request edits
            and:
              - match:
                  type: value
                  value: pull_request
                  parameter:
                    source: header
                    name: x-github-event
              - match:
                  type: value
                  value: edited
                  parameter:
                    source: payload
                    name: action
              - match:
                  type: value
                  value: open
                  parameter:
                    source: payload
                    name: pull_request.state
              - match:
                  type: value
                  value: mushu-bot[bot]
                  parameter:
                    source: payload
                    name: pull_request.user.login
          - # Trigger on GitHub Pull Request merge
            and:
              - match:
                  type: value
                  value: pull_request
                  parameter:
                    source: header
                    name: x-github-event
              - match:
                  type: value
                  value: closed
                  parameter:
                    source: payload
                    name: action
              - match:
                  type: value
                  value: true
                  parameter:
                    source: payload
                    name: pull_request.merged
              - match:
                  type: value
                  value: mushu-bot[bot]
                  parameter:
                    source: payload
                    name: pull_request.user.login

# Webhook pour notifier OpenClaw des issues avec label "bot"
- id: github-oxygn-bot
  execute-command: /config/github.sh
  pass-environment-to-command:
    - source: string
      envname: OPENCLAW_WEBHOOK_TOKEN
      name: >-
        {{ getenv "OPENCLAW_WEBHOOK_TOKEN" }}
  pass-arguments-to-command:
    - # OpenClaw webhook URL
      source: string
      name: http://openclaw.ai:18789/hooks/agent
  trigger-rule:
    and:
      - # Validate the webhook secret (same as OpenClaw auth)
        match:
          type: payload-hmac-sha1
          secret: >-
            {{ getenv "GITHUB_ISSUES_WEBHOOK_SECRET" | js }}
          parameter:
            source: header
            name: x-hub-signature
      - # Trigger only for the oxygn repo owner
        match:
          type: value
          value: OxygnCorp
          parameter:
            source: payload
            name: repository.owner.login
      # Trigger on only essential event types with OR conditions
      - or:
          - and:
              - # Trigger on GitHub Issue opened
                match:
                  type: value
                  value: issues
                  parameter:
                    source: header
                    name: x-github-event
              - # Trigger only for opened issues
                match:
                  type: value
                  value: open
                  parameter:
                    source: payload
                    name: issue.state
              - # Trigger only if issue is assigned to puchu-ai
                match:
                  type: value
                  value: puchu-ai
                  parameter:
                    source: payload
                    name: issue.assignees.*.login
          - and:
              - # Trigger on GitHub Issue assigned
                match:
                  type: value
                  value: issues
                  parameter:
                    source: header
                    name: x-github-event
              - # Trigger on assigned action
                match:
                  type: value
                  value: assigned
                  parameter:
                    source: payload
                    name: action
              - # Trigger only if issue is assigned to puchu-ai
                match:
                  type: value
                  value: puchu-ai
                  parameter:
                    source: payload
                    name: issue.assignee.login
          - and:
              - # Trigger on issue_comment events
                match:
                  type: value
                  value: issue_comment
                  parameter:
                    source: header
                    name: x-github-event
              - # Issue is assigned to puchu-ai
                match:
                  type: value
                  value: puchu-ai
                  parameter:
                    source: payload
                    name: issue.assignees.*.login
          - and:
              - # Trigger on issue_comment events
                match:
                  type: value
                  value: issue_comment
                  parameter:
                    source: header
                    name: x-github-event
              - # Comment contains @puchu-ai mention
                match:
                  type: regex
                  value: "@puchu-ai"
                  parameter:
                    source: payload
                    name: comment.body
          - and:
              - # Trigger on pull request ASSIGNED events
                match:
                  type: value
                  value: pull_request
                  parameter:
                    source: header
                    name: x-github-event
              - # Trigger on assigned action
                match:
                  type: value
                  value: assigned
                  parameter:
                    source: payload
                    name: action
              - # PR is assigned to puchu-ai
                match:
                  type: value
                  value: puchu-ai
                  parameter:
                    source: payload
                    name: pull_request.assignee.login
          - # Trigger on pull request OPENED events (new PRs)
            and:
              - match:
                  type: value
                  value: pull_request
                  parameter:
                    source: header
                    name: x-github-event
              - match:
                  type: value
                  value: opened
                  parameter:
                    source: payload
                    name: action
              - # PR is assigned to puchu-ai
                match:
                  type: value
                  value: puchu-ai
                  parameter:
                    source: payload
                    name: pull_request.assignees.*.login
          - # Trigger on pull request REOPENED events (reopened closed PRs)
            and:
              - match:
                  type: value
                  value: pull_request
                  parameter:
                    source: header
                    name: x-github-event
              - match:
                  type: value
                  value: reopened
                  parameter:
                    source: payload
                    name: action
          - # Trigger on pull request SYNCHRONIZE events (new commits pushed to existing PRs)
            and:
              - match:
                  type: value
                  value: pull_request
                  parameter:
                    source: header
                    name: x-github-event
              - match:
                  type: value
                  value: synchronize
                  parameter:
                    source: payload
                    name: action
              # PR is assigned to puchu-ai
              - match:
                  type: value
                  value: puchu-ai
                  parameter:
                    source: payload
                    name: pull_request.assignees.*.login
          - # Trigger on pull request review events (approvals)
            and:
              - match:
                  type: value
                  value: pull_request_review
                  parameter:
                    source: header
                    name: x-github-event
              - match:
                  type: value
                  value: submitted
                  parameter:
                    source: payload
                    name: action
              - match:
                  type: value
                  value: approved
                  parameter:
                    source: payload
                    name: review.state
