---
- id: github-oxygn-renovate
  execute-command: /config/renovate-operator.sh
  pass-arguments-to-command:
    - # job name
      source: string
      name: oxygncorp
    - # namespace
      source: string
      name: renovate
    - # project
      source: payload
      name: repository.full_name
    - # Renovate Operator webhook URL
      source: string
      name: http://renovate-operator.renovate.svc.cluster.local:8082
  trigger-rule:
    and:
      - # Validate the webhook secret
        match:
          type: payload-hmac-sha1
          secret: >-
            {{ getenv "RENOVATE_GITHUB_WEBHOOK_SECRET" | js }}
          parameter:
            source: header
            name: x-hub-signature
      - # Trigger only for the oxygn repo owner
        match:
          type: value
          value: OxygnCorp
          parameter:
            source: payload
            name: repository.owner.login
      - or:
          - # Trigger on GitHub Issue edits
            and:
              - match:
                  type: value
                  value: issues
                  parameter:
                    source: header
                    name: x-github-event
              - match:
                  type: value
                  value: edited
                  parameter:
                    source: payload
                    name: action
              - match:
                  type: value
                  value: open
                  parameter:
                    source: payload
                    name: issue.state
              - match:
                  type: value
                  value: "Renovate Dashboard 🤖"
                  parameter:
                    source: payload
                    name: issue.title
          - # Trigger on GitHub Pull Request edits
            and:
              - match:
                  type: value
                  value: pull_request
                  parameter:
                    source: header
                    name: x-github-event
              - match:
                  type: value
                  value: edited
                  parameter:
                    source: payload
                    name: action
              - match:
                  type: value
                  value: open
                  parameter:
                    source: payload
                    name: pull_request.state
              - match:
                  type: value
                  value: mushu-bot[bot]
                  parameter:
                    source: payload
                    name: pull_request.user.login
          - # Trigger on GitHub Pull Request merge
            and:
              - match:
                  type: value
                  value: pull_request
                  parameter:
                    source: header
                    name: x-github-event
              - match:
                  type: value
                  value: closed
                  parameter:
                    source: payload
                    name: action
              - match:
                  type: value
                  value: true
                  parameter:
                    source: payload
                    name: pull_request.merged
              - match:
                  type: value
                  value: mushu-bot[bot]
                  parameter:
                    source: payload
                    name: pull_request.user.login

# Webhook pour notifier OpenClaw des issues avec label "bot"
- id: github-oxygn-issues-bot
  execute-command: /bin/sh
  pass-arguments-to-command:
    - source: string
      value: "-c"
    - source: string
      value: >
        curl -s -X POST
        "http://openclaw-gateway.openclaw.svc.cluster.local:18789/hooks/github-issues?sessionKey=devops"
        -H "Content-Type: application/json"
        -H "Authorization: Bearer {{ getenv "GITHUB_ISSUES_WEBHOOK_SECRET" | js }}"
        -d @-
  trigger-rule:
    and:
      - # DEBUG: Skip HMAC validation - signature changes on every request due to timestamps
        match:
          type: value
          value: sha1=
          parameter:
            source: header
            name: x-hub-signature
      - # Trigger only for the oxygn repo owner
        match:
          type: value
          value: OxygnCorp
          parameter:
            source: payload
            name: repository.owner.login
      - # Trigger on GitHub Issue
        match:
          type: value
          value: issues
          parameter:
            source: header
            name: x-github-event
      - # Trigger on opened OR labeled (any action on open issues)
        match:
          type: contains
          parameter:
            source: payload
            name: issue.state
          contains: open
      - # Trigger only if issue has "bot" label
        or:
          - match:
              type: contains
              parameter:
                source: payload
                name: issue.labels
              contains: '"name":"bot"'
          - match:
              type: value
              parameter:
                source: payload
                name: label.name
              value: bot
