---
# yaml-language-server: $schema=https://raw.githubusercontent.com/plane-community/helm-charts/main/charts/plane/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plane
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: plane
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Plane images
    plane:
      image:
        repository: ghcr.io/plane-community/plane-backend
        tag: 5.0.0
        pullPolicy: IfNotPresent
      web:
        image:
          repository: ghcr.io/plane-community/plane-frontend
          tag: 5.0.0
          pullPolicy: IfNotPresent
      secret:
        existingSecret: plane-secret
      settings:
        admin:
          email: "admin@oxygn.dev"
        email:
          enabled: false
        external-url:
          value: https://plane.oxygn.dev
        cubic_url:
          value: ""
    # Bundled PostgreSQL
    postgresql:
      enabled: true
      auth:
        username: plane
        password: plane_pg_password
        database: plane
      persistence:
        enabled: true
        storageClass: ceph-block
        size: 5Gi
    # Bundled Redis
    redis:
      enabled: true
      auth:
        password: plane_redis_password
      persistence:
        enabled: true
        storageClass: ceph-block
        size: 1Gi
    # Ingress
    ingress:
      enabled: true
      className: cilium
      annotations:
        cilium.io/ingress-secure-port: "443"
      hosts:
        - host: plane.oxygn.dev
          paths:
            - path: /
              pathType: Prefix
    # Persistence
    persistence:
      media:
        enabled: true
        storageClass: ceph-block
        size: 5Gi
      uploads:
        enabled: true
        storageClass: ceph-block
        size: 5Gi
