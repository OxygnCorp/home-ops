---
# yaml-language-server: $schema=https://raw.githubusercontent.com/makeplane/helm-charts/main/charts/plane-ce/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plane
spec:
  interval: 1h
  chart:
    spec:
      chart: plane-ce
      version: "1.5.0"
      sourceRef:
        kind: HelmRepository
        name: plane
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    planeVersion: v1.2.3
    # Image pull for ghcr.io
    dockerRegistry:
      enabled: true
      host: ghcr.io
      loginid: puchu-ai
      password: CHANGEME_GHCR_TOKEN
    # Ingress
    ingress:
      enabled: true
      appHost: plane.oxygn.dev
      ingressClass: cilium
      ingress_annotations:
        cilium.io/ingress-secure-port: "443"
    # Storage
    postgres:
      local_setup: true
      storageClass: ceph-block
      volumeSize: 5Gi
    redis:
      local_setup: true
      storageClass: ceph-block
      volumeSize: 1Gi
    rabbitmq:
      local_setup: true
      storageClass: ceph-block
      volumeSize: 1Gi
    minio:
      local_setup: true
      storageClass: ceph-block
      volumeSize: 5Gi
    # Admin settings
    admin:
      enabled: true
      email: admin@oxygn.dev
    # Secrets
    env:
      secret_key: ZWX26VJdlcVHqgmdsCwA7wM+9/lQI4m6iyL139tHJ8A=
      live_server_secret_key: htbqvBJAgpm9bzvf3r4urJer0ENReatceh
      pgdb_username: plane
      pgdb_password: plane_pg_password
      pgdb_name: plane
    # Scale
    api:
      replicas: 1
      memoryLimit: 1000Mi
    web:
      replicas: 1
      memoryLimit: 1000Mi
    worker:
      replicas: 1
    space:
      replicas: 1
    live:
      replicas: 1
    admin:
      replicas: 1
    beatworker:
      replicas: 1
