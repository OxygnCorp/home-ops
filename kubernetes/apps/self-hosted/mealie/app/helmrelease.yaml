---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: mealie
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      mealie:
        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.20.0@sha256:060031897306aaee2cafd098ebe718f0d649abceac3a3f29801e6dab5f6db04b
              pullPolicy: IfNotPresent
            env:
              TZ: "Europe/Paris"
              PUID: 1024
              PGID: 100
              DEFAULT_EMAIL: "postmaster@oxygn.dev"
              ALLOW_SIGNUP: false
              API_PORT: &port 9000
              AUTO_BACKUP_ENABLED: false
              BASE_URL: https://mealie.oxygn.dev
              SMTP_HOST: smtp-relay.kube-system.svc.cluster.local.
              SMTP_PORT: 25
              SMTP_FROM_NAME: mealie@oxygn.dev
              SMTP_AUTH_STRATEGY: none
              SMTP_FROM_EMAIL: mealie@oxygn.dev
              TOKEN_TIME: 720
            resources:
              requests:
                cpu: 10m
                memory: 256M
              limits:
                memory: 512M
                cpu: 200m
    service:
      app:
        controller: mealie
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
        hostnames: ["{{ .Release.Name }}.oxygn.dev"]
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      api-data:
        enabled: true
        existingClaim: mealie
        globalMounts:
          - path: /app/data/
