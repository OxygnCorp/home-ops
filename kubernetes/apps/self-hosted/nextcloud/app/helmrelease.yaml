---
# yaml-language-server: $schema=https://k8s-schemas.oxygn.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  chartRef:
    kind: OCIRepository
    name: nextcloud
  interval: 1h
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    image:
      flavor: fpm-alpine

    nginx:
      enabled: true

    nextcloud:
      datadir: /var/www/data
      host: &host nextcloud.oxygn.dev
      existingSecret:
        enabled: true
        secretName: nextcloud-secret
        usernameKey: username
        passwordKey: password
      mail:
        enabled: false
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array (
            'check_data_directory_permissions' => false,
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
            'mail_smtpmode' => 'null',
            'skeletondirectory' => '',
            'trusted_proxies' => array(
              0 => '127.0.0.1',
              1 => '10.42.0.0/16',
            ),
          ); ?>
        misc.config.php: |-
          <?php
          $CONFIG = array (
            'default_phone_region' => 'FR',
            'maintenance_window_start' => 2,
          ); ?>

    externalDatabase:
      enabled: true
      type: postgresql
      host: postgres-rw.database.svc.cluster.local
      database: nextcloud
      existingSecret:
        enabled: true
        secretName: nextcloud-db-secret
        usernameKey: username
        passwordKey: password

    externalRedis:
      enabled: true
      host: nextcloud-dragonfly
      port: 6379

    cronjob:
      type: cronjob
      enabled: true
      cronjob:
        affinity:
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - nextcloud
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - app
                topologyKey: kubernetes.io/hostname
        securityContext:
          runAsUser: 82
          runAsGroup: 82
        successfulJobsHistoryLimit: 1

    httpRoute:
      enabled: true
      hostnames:
        - *host
      parentRefs:
        - name: envoy-external
          namespace: network
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: "/"
          filters:
            - type: ResponseHeaderModifier
              responseHeaderModifier:
                add:
                  - name: strict-transport-security
                    value: max-age=31536000

    persistence:
      enabled: true
      existingClaim: nextcloud

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi

  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: nextcloud
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: nextcloud
              spec:
                template:
                  spec:
                    hostUsers: false
