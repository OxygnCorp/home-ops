---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radar
spec:
  interval: 1h
  chart:
    spec:
      chart: radar
      version: 1.8.0
      sourceRef:
        kind: HelmRepository
        name: radar
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    persistence:
      enabled: false

    timeline:
      storage: sqlite
      retention: 720h
      maxSize: 800Mi

    ingress:
      enabled: false

    rbac:
      podLogs: true
      podExec: false
      portForward: false
      helm: false
      secrets: false
      traffic: true
      metrics: true

    traffic:
      prometheusUrl: http://prometheus-operated.observability.svc.cluster.local:9090

    auth:
      mode: none

    mcp:
      enabled: true

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: radar
            patch: |-
              - op: add
                path: /spec/strategy
                value:
                  type: Recreate
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: data
                  persistentVolumeClaim:
                    claimName: radar
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: data
                  mountPath: /data
