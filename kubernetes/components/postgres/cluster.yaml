---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${APP}
  annotations:
    # Required for same-path/same-serverName rebuilds via bootstrap.recovery.
    # The default check blocks recovery when the destination archive is non-empty,
    # which is exactly the case when the rebuilt cluster reuses the same Barman
    # path. Safe here because the recovered cluster inherits the source's
    # system_identifier and writes new WAL on a new timeline (no name collisions).
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  minSyncReplicas: 1
  maxSyncReplicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 850Mi
  storage:
    storageClass: openebs-hostpath
    size: 5Gi
  postgresql:
    parameters:
      max_connections: "300"
      max_wal_size: "5GB"
      synchronous_commit: "on"
  bootstrap:
    recovery:
      source: ${APP}
      database: ${APP}
      owner: ${APP}
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: ${APP}
        serverName: ${APP}
  externalClusters:
    - name: ${APP}
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: ${APP}
          serverName: ${APP}
  monitoring:
    enablePodMonitor: true
