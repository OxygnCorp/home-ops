---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: ${APP}
spec:
  identity:
    username: ${APP} # pin volsync fork identity (fork records sanitized metadata.name; kopiur default would be <namespace>-<app>)
  credentialProjection:
    enabled: true # project the ClusterRepository's credentials Secret into the workload namespace for the mover Job's envFrom
  compression:
    compressor: zstd
  mover:
    securityContext:
      runAsUser: ${KOPIUR_PUID:=1024}
      runAsGroup: ${KOPIUR_PGID:=100}
    podSecurityContext:
      fsGroup: ${KOPIUR_PGID:=100}
      fsGroupChangePolicy: OnRootMismatch
    cache:
      capacity: ${KOPIUR_CAPACITY:=5Gi}
      mode: Persistent
      storageClassName: ${KOPIUR_CACHE_STORAGECLASS:=openebs-hostpath}
  repository:
    kind: ClusterRepository
    name: ${KOPIUR_REPOSITORY:=nas}
  retention:
    keepLatest: 3
    keepHourly: 24
    keepDaily: 7
    keepWeekly: 4
  sources:
    - pvc:
        name: ${APP}
      sourcePathOverride: /data # pin volsync fork mount path (kopiur default is /pvc/<name>)
  volumeSnapshotClassName: ${KOPIUR_SNAPSHOTCLASS:=csi-ceph-blockpool}
